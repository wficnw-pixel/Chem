<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chem Practice</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Crimson+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e27; --bg2: #151b3d; --card: #1a2351;
            --blue: #4a9eff; --cyan: #00d4ff; --yellow: #ffd700;
            --text: #e8edf5; --muted: #a8b5d1; --border: #2d3a5f;
            --ok: #00ff88; --err: #ff4466;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { height:100%; overflow:hidden; }
        body { font-family:'Crimson Pro',serif; background:var(--bg); color:var(--text); }

        .stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
        .star { position:absolute; width:2px; height:2px; background:var(--cyan); border-radius:50%; animation:twinkle 3s infinite; }
        @keyframes twinkle { 0%,100%{opacity:.2} 50%{opacity:1} }

        /* ‚ĒÄ‚ĒÄ TOP BAR ‚ĒÄ‚ĒÄ */
        .topbar {
            position:relative; z-index:1;
            display:flex; align-items:center; justify-content:space-between;
            padding:14px 24px;
            background:var(--bg2); border-bottom:2px solid var(--border);
        }
        .logo { font-family:'JetBrains Mono',monospace; font-size:1.4rem; font-weight:700;
            background:linear-gradient(135deg,var(--cyan),var(--blue));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .stats { display:flex; gap:30px; }
        .stat { text-align:center; }
        .stat-val { font-family:'JetBrains Mono',monospace; font-size:1.4rem; font-weight:700; color:var(--cyan); line-height:1; }
        .stat-lbl { font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }

        /* ‚ĒÄ‚ĒÄ MAIN LAYOUT ‚ĒÄ‚ĒÄ */
        .layout {
            position:relative; z-index:1;
            display:grid;
            grid-template-columns:240px 1fr;
            height:calc(100vh - 61px);
        }

        /* ‚ĒÄ‚ĒÄ SIDEBAR ‚ĒÄ‚ĒÄ */
        .sidebar {
            background:var(--bg2); border-right:2px solid var(--border);
            overflow-y:auto; padding:12px 10px; display:flex; flex-direction:column; gap:6px;
        }
        .sidebar-label {
            font-family:'JetBrains Mono',monospace; font-size:0.65rem; text-transform:uppercase;
            letter-spacing:2px; color:var(--muted); padding:4px 8px 8px;
        }
        .unit-btn {
            display:flex; align-items:center; gap:10px;
            padding:10px 12px; border-radius:10px; cursor:pointer;
            background:var(--card); border:2px solid transparent;
            transition:all .25s ease; font-family:'JetBrains Mono',monospace;
            font-size:0.82rem; font-weight:600; color:var(--text);
        }
        .unit-btn:hover { border-color:var(--blue); transform:translateX(3px); }
        .unit-btn.active { border-color:var(--cyan); background:linear-gradient(135deg,var(--card),#1e2a5a); color:var(--cyan); }
        .unit-btn .icon { font-size:1.1rem; flex-shrink:0; }
        .unit-btn .name { flex:1; }

        /* ‚ĒÄ‚ĒÄ PROBLEM PANEL ‚ĒÄ‚ĒÄ */
        .panel { overflow-y:auto; padding:24px 28px; display:flex; flex-direction:column; gap:16px; }

        .placeholder {
            flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
            color:var(--muted); font-family:'JetBrains Mono',monospace; gap:12px; text-align:center;
        }
        .placeholder .big { font-size:3rem; }
        .placeholder p { font-size:0.85rem; letter-spacing:1px; }

        .unit-header {
            display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
        }
        .unit-title-lbl {
            font-family:'JetBrains Mono',monospace; font-size:0.8rem; text-transform:uppercase;
            letter-spacing:2px; color:var(--cyan);
        }
        .diff-row { display:flex; gap:8px; }
        .diff-btn {
            padding:7px 16px; background:var(--card); border:2px solid var(--border);
            border-radius:8px; color:var(--muted); font-family:'JetBrains Mono',monospace;
            font-size:0.8rem; font-weight:600; cursor:pointer; transition:all .2s;
        }
        .diff-btn:hover { border-color:var(--blue); color:var(--text); }
        .diff-btn.active { background:var(--blue); border-color:var(--blue); color:var(--bg); }

        .problem-box {
            background:var(--card); border-left:4px solid var(--cyan);
            border-radius:12px; padding:22px 24px; font-size:1.15rem; line-height:1.75;
        }
        .given-data {
            background:rgba(74,158,255,.1); border-radius:8px; padding:12px 14px;
            margin-top:12px; font-family:'JetBrains Mono',monospace; font-size:.88rem; line-height:1.7;
        }

        .answer-row { display:flex; gap:12px; }
        input[type=number] {
            flex:1; padding:13px 18px; background:var(--bg); border:2px solid var(--border);
            border-radius:10px; color:var(--text); font-family:'JetBrains Mono',monospace;
            font-size:1rem; transition:all .2s;
        }
        input[type=number]:focus { outline:none; border-color:var(--cyan); box-shadow:0 0 0 3px rgba(0,212,255,.15); }

        .btn {
            padding:13px 28px; background:linear-gradient(135deg,var(--blue),var(--cyan));
            border:none; border-radius:10px; color:var(--bg); font-family:'JetBrains Mono',monospace;
            font-size:.9rem; font-weight:700; cursor:pointer; transition:all .2s;
            text-transform:uppercase; letter-spacing:.5px; white-space:nowrap;
        }
        .btn:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(74,158,255,.4); }
        .btn:active { transform:translateY(0); }
        .btn-sec {
            background:var(--card); border:2px solid var(--border); color:var(--text);
        }
        .btn-sec:hover { border-color:var(--blue); box-shadow:0 6px 18px rgba(74,158,255,.2); }
        .btn-hint {
            background:transparent; border:2px dashed var(--border); color:var(--muted);
        }
        .btn-hint:hover { border-color:var(--yellow); color:var(--yellow); }

        .action-row { display:flex; gap:12px; }

        .feedback { border-radius:12px; padding:18px; animation:fadeIn .3s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
        .feedback.correct { background:rgba(0,255,136,.12); border:2px solid var(--ok); }
        .feedback.incorrect { background:rgba(255,68,102,.12); border:2px solid var(--err); }
        .fb-title { font-family:'JetBrains Mono',monospace; font-size:1.1rem; font-weight:700; margin-bottom:8px; }
        .solution { background:var(--card); border-radius:10px; padding:16px; margin-top:12px; }
        .solution h4 { color:var(--cyan); font-family:'JetBrains Mono',monospace; font-size:.85rem; margin-bottom:10px; }
        .step { margin:8px 0; padding-left:16px; border-left:3px solid var(--border); font-size:.95rem; }
        .hint-box { background:rgba(255,215,0,.08); border:2px solid var(--yellow); border-radius:10px; padding:14px; font-size:.95rem; }

        /* ‚ĒÄ‚ĒÄ MOBILE ‚ĒÄ‚ĒÄ */
        @media(max-width:700px){
            html,body{ overflow:auto; }
            .layout{ grid-template-columns:1fr; height:auto; }
            .sidebar{ flex-direction:row; flex-wrap:wrap; overflow-y:visible; border-right:none; border-bottom:2px solid var(--border); }
            .unit-btn{ flex:0 0 calc(50% - 6px); }
            .panel{ padding:16px; }
            .stats{ gap:16px; }
        }
    </style>
</head>
<body>
<div class="stars" id="stars"></div>

<!-- TOP BAR -->
<div class="topbar">
    <div class="logo">‚öó Chem Practice</div>
    <div class="stats">
        <div class="stat"><div class="stat-val" id="sAttempted">0</div><div class="stat-lbl">Attempted</div></div>
        <div class="stat"><div class="stat-val" id="sCorrect">0</div><div class="stat-lbl">Correct</div></div>
        <div class="stat"><div class="stat-val" id="sAccuracy">‚ÄĒ</div><div class="stat-lbl">Accuracy</div></div>
    </div>
</div>

<!-- LAYOUT -->
<div class="layout">
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-label">Units</div>
        <div class="unit-btn" data-unit="measurements"><span class="icon">ūüďŹ</span><span class="name">Measurements</span></div>
        <div class="unit-btn" data-unit="moles"><span class="icon">‚öõÔłŹ</span><span class="name">The Mole</span></div>
        <div class="unit-btn" data-unit="stoichiometry"><span class="icon">‚öóÔłŹ</span><span class="name">Stoichiometry</span></div>
        <div class="unit-btn" data-unit="gases"><span class="icon">ūüí®</span><span class="name">Gases</span></div>
        <div class="unit-btn" data-unit="solutions"><span class="icon">ūüß™</span><span class="name">Solutions</span></div>
        <div class="unit-btn" data-unit="thermochemistry"><span class="icon">ūüĒ•</span><span class="name">Thermochemistry</span></div>
        <div class="unit-btn" data-unit="equilibrium"><span class="icon">‚öĖÔłŹ</span><span class="name">Equilibrium</span></div>
        <div class="unit-btn" data-unit="acids"><span class="icon">ūüßę</span><span class="name">Acids &amp; Bases</span></div>
        <div class="unit-btn" data-unit="redox"><span class="icon">‚ö°</span><span class="name">Redox &amp; Electrochem</span></div>
        <div class="unit-btn" data-unit="nuclear"><span class="icon">‚ėĘÔłŹ</span><span class="name">Nuclear Chemistry</span></div>
    </div>

    <!-- PROBLEM PANEL -->
    <div class="panel" id="panel">
        <div class="placeholder" id="placeholder">
            <div class="big">‚öóÔłŹ</div>
            <p>SELECT A UNIT FROM THE LEFT TO BEGIN</p>
        </div>
        <div id="problemUI" style="display:none; display:flex; flex-direction:column; gap:16px;">
            <div class="unit-header">
                <div class="unit-title-lbl" id="unitLbl"></div>
                <div class="diff-row">
                    <button class="diff-btn active" data-diff="basic">Basic</button>
                    <button class="diff-btn" data-diff="intermediate">Intermediate</button>
                    <button class="diff-btn" data-diff="advanced">Advanced ‚ėÖ</button>
                </div>
            </div>
            <div class="problem-box" id="problemBox"></div>
            <div class="answer-row">
                <input type="number" id="answerInput" placeholder="Enter your answer‚Ä¶" step="any">
                <button class="btn" onclick="checkAnswer()">Submit</button>
            </div>
            <div class="action-row">
                <button class="btn btn-sec" onclick="generateProblem()">New Problem</button>
                <button class="btn btn-hint" onclick="showHint()">ūüí° Hint</button>
            </div>
            <div id="feedback"></div>
        </div>
    </div>
</div>

<script>
// Stars
const sc=document.getElementById('stars');
for(let i=0;i<80;i++){const s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.animationDelay=Math.random()*3+'s';sc.appendChild(s);}

let unit=null,diff='basic',prob=null,stats={a:0,c:0},hinted=false;
const names={measurements:'Measurements',moles:'The Mole',stoichiometry:'Stoichiometry',gases:'Gases',solutions:'Solutions',thermochemistry:'Thermochemistry',equilibrium:'Equilibrium',acids:'Acids & Bases',redox:'Redox & Electrochem',nuclear:'Nuclear Chemistry'};

document.querySelectorAll('.unit-btn').forEach(b=>b.addEventListener('click',function(){
    document.querySelectorAll('.unit-btn').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');
    unit=this.dataset.unit;
    document.getElementById('placeholder').style.display='none';
    document.getElementById('problemUI').style.display='flex';
    document.getElementById('unitLbl').textContent='// '+names[unit];
    generateProblem();
}));

document.querySelectorAll('.diff-btn').forEach(b=>b.addEventListener('click',function(){
    document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');
    diff=this.dataset.diff;
    if(unit) generateProblem();
}));

function r(a,b,d=0){const v=Math.random()*(b-a)+a;return d===0?Math.round(v):parseFloat(v.toFixed(d));}

// Convert Unicode sub/superscripts ‚Üí proper HTML tags so formulas render cleanly
function chemFmt(s){
    if(!s)return s;
    const sub={'‚āÄ':'0','‚āĀ':'1','‚āā':'2','‚āÉ':'3','‚āĄ':'4','‚āÖ':'5','‚āÜ':'6','‚āá':'7','‚āą':'8','‚āČ':'9'};
    const sup={'‚Āį':'0','¬Ļ':'1','¬≤':'2','¬≥':'3','‚Āī':'4','‚ĀĶ':'5','‚Ā∂':'6','‚Ā∑':'7','‚Āł':'8','‚ĀĻ':'9','‚Āļ':'+','‚ĀĽ':'-'};
    return s
        .replace(/[‚āÄ-‚āČ]/g, c => `<sub>${sub[c]||c}</sub>`)
        .replace(/[‚Āį-‚ĀĻ‚Āļ‚ĀĽ]/g, c => `<sup>${sup[c]||c}</sup>`);
}

function generateProblem(){
    if(!unit)return;
    hinted=false;
    document.getElementById('feedback').innerHTML='';
    document.getElementById('answerInput').value='';
    const gens={measurements:genMeasure,moles:genMoles,stoichiometry:genStoich,gases:genGases,solutions:genSolutions,thermochemistry:genThermo,equilibrium:genEquil,acids:genAcids,redox:genRedox,nuclear:genNuclear};
    prob=gens[unit]();
    document.getElementById('problemBox').innerHTML=`<div>${chemFmt(prob.question)}</div>`;
}

// ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź
// MEASUREMENTS
// ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź
function genMeasure(){
    const basic=['sig_figs','si_convert','sci_notation'];
    const inter=['sig_figs','si_convert','sci_notation','density','percent_error'];
    const adv=['multistep_convert','density_chain','percent_error_chain'];
    const pool=diff==='basic'?basic:diff==='intermediate'?inter:adv;
    const t=pool[Math.floor(Math.random()*pool.length)];

    if(t==='sig_figs'){
        const nums=[
            {n:'101 g',sf:3,why:'Middle zero is trapped between nonzero digits ‚ÄĒ significant'},
            {n:'0.06 m',sf:1,why:'Leading zeros are never significant; only the 6 counts'},
            {n:'900. cm',sf:3,why:'Decimal point present: all three digits are significant'},
            {n:'40200 kg',sf:3,why:'No decimal point: trailing zeros are not significant'},
            {n:'0.0024 cm',sf:2,why:'Leading zeros not significant; only 2 and 4 count'},
            {n:'12.00 g',sf:4,why:'Trailing zeros after a decimal point are significant'},
            {n:'0.050 mL',sf:2,why:'Leading zero not sig; the 5 and trailing zero after decimal are sig'},
            {n:'1.0 √ó 10‚Āī s',sf:2,why:'Only count digits in the coefficient: 1 and 0 are both significant'},
            {n:'108.04 torr',sf:5,why:'All digits including trapped zeros are significant'},
            {n:'3000 m',sf:1,why:'No decimal point: trailing zeros not significant'},
            {n:'60 g',sf:1,why:'No decimal point: trailing zero not significant'},
            {n:'12.24 g',sf:4,why:'All nonzero digits are always significant'},
            {n:'0.84 L',sf:2,why:'Leading zero not significant; 8 and 4 are both significant'},
            {n:'6020080 cm',sf:6,why:'Zeros trapped between nonzero digits are significant'},
            {n:'0.3 √ó 10‚Ā∂ atm',sf:1,why:'Only the coefficient digit matters; leading zeros are not significant'},
        ];
        const pick=nums[Math.floor(Math.random()*nums.length)];
        return{question:`How many significant figures are in the following measurement: ${pick.n}?`,given:`Measurement: ${pick.n}`,answer:pick.sf,unit:'sig figs',steps:[pick.why,`Answer: ${pick.sf} significant figure${pick.sf>1?'s':''}`],hint:`Rules: (1) Nonzero digits are always sig. (2) Zeros trapped between nonzero digits are sig. (3) Trailing zeros after a decimal are sig. (4) Leading zeros are never sig.`};
    }
    if(t==='si_convert'){
        const cvs=[
            {f:'km',to:'m',k:1000},{f:'cm',to:'m',k:0.01},{f:'mm',to:'m',k:0.001},
            {f:'kg',to:'g',k:1000},{f:'mg',to:'g',k:0.001},{f:'cg',to:'g',k:0.01},
            {f:'g',to:'kg',k:0.001},{f:'L',to:'mL',k:1000},{f:'mL',to:'L',k:0.001},
            {f:'cm',to:'mm',k:10},{f:'g',to:'cg',k:100},{f:'Dag',to:'g',k:10},
            {f:'Mg',to:'g',k:1e6},{f:'km',to:'cm',k:1e5}
        ];
        const cv=cvs[Math.floor(Math.random()*cvs.length)],val=r(1,500,2),ans=parseFloat((val*cv.k).toFixed(4));
        return{question:`Convert ${val} ${cv.f} to ${cv.to}.`,given:`${val} ${cv.f}\n1 ${cv.f} = ${cv.k} ${cv.to}`,answer:ans,unit:cv.to,steps:[`${val} ${cv.f} √ó (${cv.k} ${cv.to} / 1 ${cv.f}) = ${ans} ${cv.to}`],hint:`Multiply by the conversion factor. Larger unit ‚Üí smaller unit means bigger number.`};
    }
    if(t==='sci_notation'){
        const exp=r(-4,5),co=r(1,9,2),val=co*Math.pow(10,exp);
        return{question:`Express ${co} √ó 10^${exp} as a standard (decimal) number.`,given:`${co} √ó 10^${exp}`,answer:val,unit:'',steps:[`Move the decimal ${Math.abs(exp)} place${Math.abs(exp)>1?'s':''} to the ${exp>=0?'right':'left'}`,`= ${val}`],hint:`Positive exponent ‚Üí move decimal right. Negative exponent ‚Üí move decimal left.`};
    }
    if(t==='density'){
        const subs=[
            {n:'aluminum',d:2.70},{n:'copper',d:8.96},{n:'lead',d:11.34},
            {n:'zinc',d:7.13},{n:'tin',d:6.99},{n:'silicon',d:2.33},
            {n:'water',d:1.00},{n:'ethanol',d:0.789},{n:'iron',d:7.87}
        ];
        const s=subs[Math.floor(Math.random()*subs.length)],sf=['density','mass','volume'][Math.floor(Math.random()*3)];
        if(sf==='density'){const m=r(10,200,1),v=r(5,100,1),d=m/v;return{question:`A substance has a mass of ${m} g and a volume of ${v} cm¬≥. What is its density?`,given:`m = ${m} g\nV = ${v} cm¬≥`,answer:d,unit:'g/cm¬≥',steps:[`D = m/V = ${m} √∑ ${v} = ${d.toFixed(3)} g/cm¬≥`],hint:`D = m/V`};}
        if(sf==='mass'){const v=r(5,50,1),m=parseFloat((s.d*v).toFixed(2));return{question:`What is the mass of ${v} cm¬≥ of ${s.n}? (Density of ${s.n} = ${s.d} g/cm¬≥)`,given:`V = ${v} cm¬≥\nD = ${s.d} g/cm¬≥`,answer:m,unit:'g',steps:[`m = D √ó V = ${s.d} √ó ${v} = ${m} g`],hint:`m = D √ó V`};}
        const m=r(10,200,1),v=parseFloat((m/s.d).toFixed(3));return{question:`What volume does ${m} g of ${s.n} occupy? (Density of ${s.n} = ${s.d} g/cm¬≥)`,given:`m = ${m} g\nD = ${s.d} g/cm¬≥`,answer:v,unit:'cm¬≥',steps:[`V = m/D = ${m} √∑ ${s.d} = ${v} cm¬≥`],hint:`V = m/D`};
    }
    if(t==='percent_error'){
        const th=r(10,100,2),dev=parseFloat((Math.random()*6-3).toFixed(2)),ex=parseFloat((th+dev).toFixed(2)),pe=Math.abs((ex-th)/th)*100;
        return{question:`The accepted value is ${th} and your experimental value is ${ex}. What is the percent error?`,given:`Accepted value = ${th}\nExperimental value = ${ex}`,answer:pe,unit:'%',steps:[`% error = |experimental ‚ąí accepted| / accepted √ó 100`,`= |${ex} ‚ąí ${th}| / ${th} √ó 100 = ${pe.toFixed(2)}%`],hint:`% error = (|experimental ‚ąí accepted| / accepted) √ó 100`};
    }
    // ADVANCED MULTI-STEP
    if(t==='multistep_convert'){
        const kmh=r(40,140,1),ms=parseFloat((kmh*1000/3600).toFixed(3));
        return{question:`A car travels at ${kmh} km/h. Convert this speed to m/s.`,given:`${kmh} km/h\n1 km = 1000 m\n1 h = 3600 s`,answer:ms,unit:'m/s',steps:[`Step 1: km ‚Üí m: ${kmh} √ó 1000 = ${kmh*1000} m/h`,`Step 2: h ‚Üí s: ${kmh*1000} √∑ 3600 = ${ms} m/s`],hint:`Two conversion factors: √ó (1000 m / 1 km), then √∑ (3600 s / 1 h).`};
    }
    if(t==='density_chain'){
        const subs2=[{n:'iron',d:7.87},{n:'aluminum',d:2.70},{n:'copper',d:8.96},{n:'lead',d:11.34}];

    if(t==='mol_to_part'){

    if(t==='mol_volume'){
        const gases=[{n:'nitrogen gas',f:'N‚āā'},{n:'oxygen gas',f:'O‚āā'},{n:'carbon dioxide',f:'CO‚āā'},{n:'hydrogen gas',f:'H‚āā'},{n:'hydrogen chloride gas',f:'HCl'},{n:'water vapor',f:'H‚āāO'},{n:'sulfur dioxide',f:'SO‚āā'},{n:'carbon monoxide',f:'CO'}];

        if(flip){const mol=r(0.5,15,2),vol=parseFloat((mol*22.4).toFixed(3));return{question:`What is the volume of ${mol} mol of ${g.n} (${g.f}) at STP?`,given:`n = ${mol} mol\n1 mol of any gas = 22.4 L at STP`,answer:vol,unit:'L',steps:[`V = n √ó 22.4 L/mol = ${mol} √ó 22.4 = ${vol} L`],hint:`At STP: V = n √ó 22.4 L/mol`};}
        const vol=r(5,200,1),mol=parseFloat((vol/22.4).toFixed(4));return{question:`How many moles of ${g.n} (${g.f}) occupy ${vol} L at STP?`,given:`V = ${vol} L\n1 mol of any gas = 22.4 L at STP`,answer:mol,unit:'mol',steps:[`n = V √∑ 22.4 = ${vol} √∑ 22.4 = ${mol} mol`],hint:`At STP: n = V √∑ 22.4 L/mol`};

            {cpd:'carbon dioxide',f:'CO‚āā',mm:44.01,el:'oxygen',elMM:31.998},
            {cpd:'ammonia',f:'NH‚āÉ',mm:17.03,el:'nitrogen',elMM:14.007},{cpd:'ammonia',f:'NH‚āÉ',mm:17.03,el:'hydrogen',elMM:3.024},
            {cpd:'sulfuric acid',f:'H‚āāSO‚āĄ',mm:98.09,el:'sulfur',elMM:32.06},
            {cpd:'calcium carbonate',f:'CaCO‚āÉ',mm:100.09,el:'calcium',elMM:40.08},
            {cpd:'sodium chloride',f:'NaCl',mm:58.44,el:'sodium',elMM:22.99},
            {cpd:'sodium chloride',f:'NaCl',mm:58.44,el:'chlorine',elMM:35.45},

    }
    const elems2=[
        {cpd:'water',f:'H‚āāO',mm:18.015,el:'oxygen',elN:1},{cpd:'carbon dioxide',f:'CO‚āā',mm:44.01,el:'oxygen',elN:2},
        {cpd:'ammonia',f:'NH‚āÉ',mm:17.03,el:'hydrogen',elN:3},{cpd:'calcium carbonate',f:'CaCO‚āÉ',mm:100.09,el:'oxygen',elN:3},

}

function genStoich(){
    const rxns=[
        {eq:'2H‚āā + O‚āā ‚Üí 2H‚āāO',desc:'hydrogen reacts with oxygen to form water',r:[{n:'H‚āā',d:'hydrogen',mm:2.02,c:2},{n:'O‚āā',d:'oxygen',mm:32.00,c:1}],p:[{n:'H‚āāO',d:'water',mm:18.02,c:2}]},

        {eq:'CH‚āĄ + 2O‚āā ‚Üí CO‚āā + 2H‚āāO',desc:'methane combusts in oxygen',r:[{n:'CH‚āĄ',d:'methane',mm:16.04,c:1},{n:'O‚āā',d:'oxygen',mm:32.00,c:2}],p:[{n:'CO‚āā',d:'CO‚āā',mm:44.01,c:1}]},
        {eq:'2Na + Cl‚āā ‚Üí 2NaCl',desc:'sodium reacts with chlorine',r:[{n:'Na',d:'sodium',mm:22.99,c:2},{n:'Cl‚āā',d:'chlorine',mm:70.90,c:1}],p:[{n:'NaCl',d:'NaCl',mm:58.44,c:2}]},
        {eq:'C‚āÉH‚āą + 5O‚āā ‚Üí 3CO‚āā + 4H‚āāO',desc:'propane combusts in oxygen',r:[{n:'C‚āÉH‚āą',d:'propane',mm:44.10,c:1},{n:'O‚āā',d:'oxygen',mm:32.00,c:5}],p:[{n:'CO‚āā',d:'CO‚āā',mm:44.01,c:3}]}
    ];
    const rxn=rxns[Math.floor(Math.random()*rxns.length)];
    const basic=['m2m'],inter=['m2m','lr'],adv=['lr_yield'];
    const pool=diff==='basic'?basic:diff==='intermediate'?inter:adv;
    const t=pool[Math.floor(Math.random()*pool.length)];

    if(t==='m2m'){
        const re=rxn.r[0],pr=rxn.p[0],m=diff==='basic'?r(5,25):r(10,80,2);
        const mol=m/re.mm,pmol=mol*(pr.c/re.c),pm=pmol*pr.mm;
        return{question:`When ${rxn.desc}, how many grams of ${pr.d} are produced from ${m} g of ${re.d}?`,given:`Equation: ${rxn.eq}\nMM: ${re.n}=${re.mm}, ${pr.n}=${pr.mm} g/mol\nRatio: ${re.c} mol ${re.n} : ${pr.c} mol ${pr.n}`,answer:pm,unit:'g',steps:[`mol ${re.n}: ${m}/${re.mm}=${mol.toFixed(4)}`,`mol ${pr.n}: √ó(${pr.c}/${re.c})=${pmol.toFixed(4)}`,`g ${pr.n}: √ó${pr.mm}=${pm.toFixed(3)} g`],hint:`g‚Üímol‚Üímole ratio‚Üímol‚Üíg`};
    }
    if(t==='lr'){
        const r1=rxn.r[0],r2=rxn.r[1],pr=rxn.p[0];
        const m1=r(10,40,2),m2=r(10,40,2),n1=m1/r1.mm,n2=m2/r2.mm;
        const rat1=n1/r1.c,rat2=n2/r2.c,lim=rat1<rat2?r1:r2,limN=rat1<rat2?n1:n2;
        const pm=limN*(pr.c/lim.c)*pr.mm;
        return{question:`When ${rxn.desc}, given ${m1} g of ${r1.d} and ${m2} g of ${r2.d}, how many grams of ${pr.d} are produced?`,given:`${r1.n}: ${m1} g (MM=${r1.mm})\n${r2.n}: ${m2} g (MM=${r2.mm})\nMM ${pr.n}=${pr.mm}`,answer:pm,unit:'g',steps:[`mol ${r1.n}=${n1.toFixed(4)} √∑${r1.c}=${rat1.toFixed(4)}`,`mol ${r2.n}=${n2.toFixed(4)} √∑${r2.c}=${rat2.toFixed(4)}`,`${lim.n} is limiting`,`Product: ${pm.toFixed(3)} g`],hint:`Divide moles by coefficient ‚ÄĒ smaller ratio = limiting reactant.`};
    }
    // ADVANCED: limiting reactant + percent yield combined (3 steps)
    const r1=rxn.r[0],r2=rxn.r.length>1?rxn.r[1]:rxn.r[0],pr=rxn.p[0];
    const m1=r(15,50,2),m2=r(15,50,2),n1=m1/r1.mm,n2=m2/r2.mm;
    const rat1=n1/r1.c,rat2=n2/r2.c;
    const lim=rat1<rat2?r1:r2,limN=rat1<rat2?n1:n2;
    const theo=limN*(pr.c/lim.c)*pr.mm;
    const actual=theo*(0.70+Math.random()*0.20),py=(actual/theo)*100;
    return{question:`When ${rxn.desc}, ${m1} g of ${r1.d} reacts with ${m2} g of ${r2.d}. If the actual yield of ${pr.d} is ${actual.toFixed(2)} g, what is the percent yield?`,given:`${r1.n}: ${m1} g (MM=${r1.mm})\n${r2.n}: ${m2} g (MM=${r2.mm})\nActual yield of ${pr.n}: ${actual.toFixed(2)} g`,answer:py,unit:'%',steps:[`Step 1 ‚ÄĒ find LR: ${r1.n} ratio=${rat1.toFixed(4)}, ${r2.n} ratio=${rat2.toFixed(4)} ‚Üí ${lim.n} limits`,`Step 2 ‚ÄĒ theoretical yield: ${limN.toFixed(4)} √ó (${pr.c}/${lim.c}) √ó ${pr.mm} = ${theo.toFixed(3)} g`,`Step 3 ‚ÄĒ % yield: (${actual.toFixed(2)}/${theo.toFixed(3)}) √ó 100 = ${py.toFixed(2)}%`],hint:`Three steps: (1) find limiting reactant, (2) calculate theoretical yield, (3) % yield = actual/theoretical √ó 100.`};
}

// ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź
function genGases(){
    const basic=['boyle','charles','gay_lussac'];
    const inter=['boyle','charles','gay_lussac','combined','ideal'];
    const adv=['ideal_stoich','combined_celsius','dalton_partial'];
    const pool=diff==='basic'?basic:diff==='intermediate'?inter:adv;
    const t=pool[Math.floor(Math.random()*pool.length)];

    if(t==='boyle'){const P1=r(1,5,2),V1=r(1,10,2),P2=r(1,8,2),V2=P1*V1/P2;return{question:`A gas is at ${P1} atm and ${V1} L. What volume does it occupy at ${P2} atm (constant T)?`,given:`P‚āĀ=${P1} atm, V‚āĀ=${V1} L, P‚āā=${P2} atm`,answer:V2,unit:'L',steps:[`P‚āĀV‚āĀ=P‚āāV‚āā ‚Üí V‚āā=${P1}√ó${V1}/${P2}=${V2.toFixed(3)} L`],hint:`Boyle's Law: P‚āĀV‚āĀ = P‚āāV‚āā`};}
    if(t==='charles'){const V1=r(1,10,2),T1=r(250,400,1),T2=r(200,500,1),V2=V1*T2/T1;return{question:`A gas occupies ${V1} L at ${T1} K. What volume at ${T2} K (constant P)?`,given:`V‚āĀ=${V1} L, T‚āĀ=${T1} K, T‚āā=${T2} K`,answer:V2,unit:'L',steps:[`V‚āĀ/T‚āĀ=V‚āā/T‚āā ‚Üí V‚āā=${V1}√ó${T2}/${T1}=${V2.toFixed(3)} L`],hint:`Charles's Law: V‚āĀ/T‚āĀ = V‚āā/T‚āā (K required!)`};}
    if(t==='gay_lussac'){const P1=r(1,5,2),T1=r(250,400,1),T2=r(200,500,1),P2=P1*T2/T1;return{question:`A gas has pressure ${P1} atm at ${T1} K. What is its pressure at ${T2} K (constant V)?`,given:`P‚āĀ=${P1} atm, T‚āĀ=${T1} K, T‚āā=${T2} K`,answer:P2,unit:'atm',steps:[`P‚āĀ/T‚āĀ=P‚āā/T‚āā ‚Üí P‚āā=${P1}√ó${T2}/${T1}=${P2.toFixed(3)} atm`],hint:`Gay-Lussac's Law: P‚āĀ/T‚āĀ = P‚āā/T‚āā`};}
    if(t==='combined'){const P1=r(1,4,2),V1=r(1,8,2),T1=r(250,400,1),P2=r(1,5,2),T2=r(200,500,1),V2=P1*V1*T2/(T1*P2);return{question:`Gas: P‚āĀ=${P1} atm, V‚āĀ=${V1} L, T‚āĀ=${T1} K. Find V‚āā when P‚āā=${P2} atm, T‚āā=${T2} K.`,given:`P‚āĀ=${P1},V‚āĀ=${V1},T‚āĀ=${T1},P‚āā=${P2},T‚āā=${T2}`,answer:V2,unit:'L',steps:[`P‚āĀV‚āĀ/T‚āĀ=P‚āāV‚āā/T‚āā ‚Üí V‚āā=${V2.toFixed(3)} L`],hint:`Combined Gas Law: P‚āĀV‚āĀ/T‚āĀ = P‚āāV‚āā/T‚āā`};}
    if(t==='ideal'){
        const R=0.08206,sf=['P','V','n','T'][Math.floor(Math.random()*4)];
        if(sf==='P'){const n=r(0.5,3,2),V=r(1,10,2),T=r(250,400,1),P=n*R*T/V;return{question:`Find pressure: ${n} mol gas, ${V} L, ${T} K.`,given:`n=${n},V=${V},T=${T},R=0.08206`,answer:P,unit:'atm',steps:[`P=nRT/V=(${n}√ó0.08206√ó${T})/${V}=${P.toFixed(3)} atm`],hint:`PV=nRT ‚Üí P=nRT/V`};}
        if(sf==='V'){const n=r(0.5,3,2),P=r(1,4,2),T=r(250,400,1),V=n*R*T/P;return{question:`Find volume: ${n} mol, ${P} atm, ${T} K.`,given:`n=${n},P=${P},T=${T},R=0.08206`,answer:V,unit:'L',steps:[`V=nRT/P=(${n}√ó0.08206√ó${T})/${P}=${V.toFixed(3)} L`],hint:`PV=nRT ‚Üí V=nRT/P`};}
        if(sf==='n'){const P=r(1,4,2),V=r(2,10,2),T=r(280,400,1),n=P*V/(R*T);return{question:`Find moles: ${P} atm, ${V} L, ${T} K.`,given:`P=${P},V=${V},T=${T},R=0.08206`,answer:n,unit:'mol',steps:[`n=PV/(RT)=(${P}√ó${V})/(0.08206√ó${T})=${n.toFixed(4)} mol`],hint:`PV=nRT ‚Üí n=PV/RT`};}
        const P=r(1,4,2),V=r(2,10,2),n=r(0.5,3,2),T=P*V/(n*R);return{question:`Find temperature: ${P} atm, ${V} L, ${n} mol.`,given:`P=${P},V=${V},n=${n},R=0.08206`,answer:T,unit:'K',steps:[`T=PV/(nR)=(${P}√ó${V})/(${n}√ó0.08206)=${T.toFixed(2)} K`],hint:`PV=nRT ‚Üí T=PV/(nR)`};
    }
    // ADVANCED MULTI-STEP
    if(t==='ideal_stoich'){
        // Given mass of compound, find volume of gas produced at given T and P
        const R=0.08206;
        const rxns2=[{eq:'CaCO‚āÉ ‚Üí CaO + CO‚āā',mm:100.09,gasN:'CO‚āā',ratio:1},{eq:'2H‚āāO‚āā ‚Üí 2H‚āāO + O‚āā',mm:34.01,gasN:'O‚āā',ratio:0.5}];
        const rxn2=rxns2[Math.floor(Math.random()*rxns2.length)];
        const mass=r(5,30,2),T=r(290,400,1),P=r(0.9,1.5,2);
        const molCompound=mass/rxn2.mm,molGas=molCompound*rxn2.ratio,V=molGas*R*T/P;
        return{question:`${mass} g of reactant decomposes: ${rxn2.eq}. What volume of ${rxn2.gasN} gas is produced at ${T} K and ${P} atm?`,given:`Mass=${mass} g, MM=${rxn2.mm} g/mol\nT=${T} K, P=${P} atm, R=0.08206 L¬∑atm/mol¬∑K`,answer:V,unit:'L',steps:[`Step 1: mol compound = ${mass}/${rxn2.mm} = ${molCompound.toFixed(4)} mol`,`Step 2: mol ${rxn2.gasN} = ${molCompound.toFixed(4)} √ó ${rxn2.ratio} = ${molGas.toFixed(4)} mol`,`Step 3: V = nRT/P = ${molGas.toFixed(4)}√ó0.08206√ó${T}/${P} = ${V.toFixed(3)} L`],hint:`Stoich first to get moles of gas, then use PV=nRT to find volume.`};
    }
    if(t==='combined_celsius'){
        // Give temps in ¬įC, students must convert to K first
        const P1=r(1,4,2),V1=r(2,8,2),T1c=r(20,100),P2=r(1,5,2),T2c=r(100,300);
        const T1=T1c+273,T2=T2c+273,V2=P1*V1*T2/(T1*P2);
        return{question:`A gas is at ${P1} atm, ${V1} L, ${T1c}¬įC. Find V‚āā when P‚āā=${P2} atm and T‚āā=${T2c}¬įC. Remember to convert ¬įC to K!`,given:`P‚āĀ=${P1} atm, V‚āĀ=${V1} L, T‚āĀ=${T1c}¬įC\nP‚āā=${P2} atm, T‚āā=${T2c}¬įC`,answer:V2,unit:'L',steps:[`Step 1: T‚āĀ=${T1c}+273=${T1} K, T‚āā=${T2c}+273=${T2} K`,`Step 2: V‚āā=P‚āĀV‚āĀT‚āā/(T‚āĀP‚āā)=${P1}√ó${V1}√ó${T2}/(${T1}√ó${P2})=${V2.toFixed(3)} L`],hint:`ALWAYS convert ¬įC to K before using gas laws (add 273).`};
    }
    // dalton_partial: given total P and two partial P, find the third
    const Pa=r(0.15,0.40,3),Pb=r(0.10,0.35,3),Ptot=r(0.80,1.20,2),Pc=Ptot-Pa-Pb;
    return{question:`A gas mixture has total pressure ${Ptot} atm. Gas A has partial pressure ${Pa} atm and Gas B has ${Pb} atm. What is the partial pressure of Gas C?`,given:`P_total=${Ptot} atm, P_A=${Pa} atm, P_B=${Pb} atm`,answer:Pc,unit:'atm',steps:[`Dalton: P_total = P_A+P_B+P_C`,`P_C = ${Ptot}‚ąí${Pa}‚ąí${Pb} = ${Pc.toFixed(3)} atm`],hint:`P_total = sum of all partial pressures ‚Üí isolate P_C.`};
}

// SOLUTIONS
// ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź
function genSolutions(){
    const basic=['molarity','dilution'];
    const inter=['molarity','dilution','mass_percent','find_vol'];
    const adv=['solid_then_dilute','mass_to_molarity','molality_chain'];
    const pool=diff==='basic'?basic:diff==='intermediate'?inter:adv;
    const t=pool[Math.floor(Math.random()*pool.length)];
    const sols=[{n:'NaCl',mm:58.44},{n:'KCl',mm:74.55},{n:'NaOH',mm:40.00},{n:'HCl',mm:36.46},{n:'CaCl‚āā',mm:110.98}];
    const s=sols[Math.floor(Math.random()*sols.length)];

    if(t==='molarity'){const mol=r(0.1,2,3),vol=r(100,1000)/1000,M=mol/vol;return{question:`What is the molarity of ${mol} mol of ${s.n} in ${vol*1000} mL of solution?`,given:`mol=${mol}, V=${vol*1000} mL`,answer:M,unit:'M',steps:[`M=n/V=${mol}/${vol}=${M.toFixed(4)} M`],hint:`M = mol √∑ L`};}
    if(t==='dilution'){const M1=r(1,6,2),V1=r(10,100,1),M2=r(0.1,1,2),V2=M1*V1/M2;return{question:`How many mL of ${M2} M can be prepared by diluting ${V1} mL of ${M1} M ${s.n}?`,given:`M‚āĀ=${M1}, V‚āĀ=${V1} mL, M‚āā=${M2}`,answer:V2,unit:'mL',steps:[`M‚āĀV‚āĀ=M‚āāV‚āā ‚Üí V‚āā=${M1}√ó${V1}/${M2}=${V2.toFixed(2)} mL`],hint:`M‚āĀV‚āĀ = M‚āāV‚āā`};}
    if(t==='mass_percent'){const mSol=r(5,50,2),mSoln=r(100,500,1),mp=mSol/mSoln*100;return{question:`What is the mass percent of ${mSol} g ${s.n} in ${mSoln} g of solution?`,given:`m_solute=${mSol} g, m_solution=${mSoln} g`,answer:mp,unit:'%',steps:[`mass% = ${mSol}/${mSoln}√ó100=${mp.toFixed(3)}%`],hint:`mass% = (m_solute/m_solution)√ó100`};}
    if(t==='find_vol'){const M=r(0.5,3,2),mol=r(0.05,0.5,3),V=mol/M;return{question:`What volume (mL) of ${M} M ${s.n} contains ${mol} mol?`,given:`M=${M}, n=${mol}`,answer:V*1000,unit:'mL',steps:[`V=n/M=${mol}/${M}=${V.toFixed(4)} L = ${(V*1000).toFixed(2)} mL`],hint:`V=n/M, then √ó 1000 for mL`};}
    // ADVANCED MULTI-STEP
    if(t==='solid_then_dilute'){
        // Dissolve solid ‚Üí initial solution ‚Üí dilute to final volume
        const mass=r(5,30,2),V1=r(100,300)/1000,V2=r(500,2000)/1000;
        const mol=mass/s.mm,M1=mol/V1,M2=M1*V1/V2;
        return{question:`${mass} g of ${s.n} is dissolved in ${V1*1000} mL of water, then diluted to a total volume of ${V2*1000} mL. What is the final molarity?`,given:`Mass=${mass} g, MM=${s.mm} g/mol\nInitial volume=${V1*1000} mL, Final volume=${V2*1000} mL`,answer:M2,unit:'M',steps:[`Step 1: mol ${s.n} = ${mass}/${s.mm} = ${mol.toFixed(4)} mol`,`Step 2: M‚āĀ = ${mol.toFixed(4)}/${V1} = ${M1.toFixed(4)} M`,`Step 3: M‚āĀV‚āĀ=M‚āāV‚āā ‚Üí M‚āā = ${M1.toFixed(4)}√ó${V1}/${V2} = ${M2.toFixed(4)} M`],hint:`Three steps: (1) grams‚Üímoles, (2) molarity of stock, (3) dilution formula M‚āĀV‚āĀ=M‚āāV‚āā.`};
    }
    if(t==='mass_to_molarity'){
        // Given mass% and density, find molarity
        const mp=r(5,20,1),dens=r(1.0,1.3,3),mm=s.mm;
        // molarity = (mass% √ó density √ó 10) / molar mass
        const M=(mp*dens*10)/mm;
        return{question:`A ${s.n} solution is ${mp}% by mass with a density of ${dens} g/mL. What is its molarity?`,given:`Mass% = ${mp}%, Density = ${dens} g/mL, MM = ${mm} g/mol`,answer:M,unit:'M',steps:[`Assume 1 L of solution: mass = ${dens} g/mL √ó 1000 mL = ${dens*1000} g`,`Mass of ${s.n} = ${mp/100} √ó ${dens*1000} = ${(mp/100*dens*1000).toFixed(2)} g`,`mol = ${(mp/100*dens*1000).toFixed(2)}/${mm} = ${((mp/100*dens*1000)/mm).toFixed(4)} mol`,`M = mol/1 L = ${M.toFixed(4)} M`],hint:`Assume 1 L solution. Use density to find total mass, then mass% to find solute mass, then √∑MM.`};
    }
    // molality_chain: given mass solute and mass solvent, find molality then boiling point elevation
    const massS=r(5,30,2),massSolv=r(100,400,1),mol2=massS/s.mm,m2=mol2/(massSolv/1000);
    return{question:`${massS} g of ${s.n} is dissolved in ${massSolv} g of water. What is the molality of the solution?`,given:`m_solute=${massS} g, MM=${s.mm} g/mol\nm_solvent=${massSolv} g`,answer:m2,unit:'m',steps:[`Step 1: mol = ${massS}/${s.mm} = ${mol2.toFixed(4)} mol`,`Step 2: molality = ${mol2.toFixed(4)}/${massSolv/1000} kg = ${m2.toFixed(4)} m`],hint:`molality = moles of solute √∑ kilograms of SOLVENT (not solution).`};
}

function genThermo(){
    const basic=['heating','cooling','phase_change'];
    const inter=['heating','cooling','phase_change','find_c','find_dT','calorimetry'];
    const adv=['multi_step','heating_then_phase','mixed_calorimetry'];
    const pool=diff==='basic'?basic:diff==='intermediate'?inter:adv;
    const t=pool[Math.floor(Math.random()*pool.length)];
    // Specific heat values from the worksheet table
    const subs=[
        {n:'water',c:4.186,Tf:0,Tb:100,Hf:334,Hv:2260},
        {n:'aluminum',c:0.900,Tf:660,Tb:2470,Hf:397,Hv:10500},
        {n:'iron',c:0.449,Tf:1538,Tb:2862,Hf:247,Hv:6090},

        {n:'marble',c:0.858,Tf:0,Tb:1000,Hf:0,Hv:0}
    ];

    if(t==='calorimetry'){

// ‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź
function genEquil(){
    const basic=['keq_calc','keq_coeff'];
    const inter=['keq_calc','keq_coeff','ice_simple','find_conc'];
    const adv=['ice_quadratic','q_direction','keq_reverse'];
    const pool=diff==='basic'?basic:diff==='intermediate'?inter:adv;
    const t=pool[Math.floor(Math.random()*pool.length)];

    if(t==='keq_calc'){const A=r(0.1,1,3),B=r(0.1,1,3),C=r(0.1,1,3),D=r(0.1,1,3),Keq=C*D/(A*B);return{question:`For A+B‚áĆC+D: [A]=${A},[B]=${B},[C]=${C},[D]=${D} M. Find Keq.`,given:`[A]=${A},[B]=${B},[C]=${C},[D]=${D}`,answer:Keq,unit:'',steps:[`Keq=[C][D]/([A][B])=(${C}√ó${D})/(${A}√ó${B})=${Keq.toFixed(4)}`],hint:`Keq = products/reactants, each raised to its coefficient`};}
    if(t==='keq_coeff'){const A=r(0.2,2,3),B=r(0.2,2,3),C=r(0.1,1,3),Keq=C**2/(A*B);return{question:`For A+B‚áĆ2C: [A]=${A},[B]=${B},[C]=${C} M. Find Keq.`,given:`[A]=${A},[B]=${B},[C]=${C}`,answer:Keq,unit:'',steps:[`Keq=[C]¬≤/([A][B])=${C}¬≤/(${A}√ó${B})=${Keq.toFixed(4)}`],hint:`Coefficients become exponents in Keq expression`};}
    if(t==='ice_simple'){const Keq=r(0.01,4,4),init=r(0.5,2,2),x=Keq*init/(1+Keq);return{question:`For A‚áĆB, Keq=${Keq}. Starting [A]‚āÄ=${init} M, [B]‚āÄ=0. Find [B] at equilibrium.`,given:`Keq=${Keq},[A]‚āÄ=${init} M`,answer:x,unit:'M',steps:[`ICE: x=amount reacted`,`Keq=x/(${init}-x)=${Keq}`,`x=${Keq}√ó${init}/(1+${Keq})=${x.toFixed(4)} M`],hint:`Set up ICE table, write Keq expression, solve for x.`};}
    if(t==='find_conc'){const Keq=r(0.5,5,3),A=r(0.1,1,3),B=r(0.1,1,3),C=Math.sqrt(Keq*A*B);return{question:`For A+B‚áĆ2C, Keq=${Keq}. At equilibrium [A]=${A},[B]=${B}. Find [C].`,given:`Keq=${Keq},[A]=${A},[B]=${B}`,answer:C,unit:'M',steps:[`Keq=[C]¬≤/([A][B]) ‚Üí [C]=‚ąö(Keq√ó[A]√ó[B])=‚ąö(${(Keq*A*B).toFixed(5)})=${C.toFixed(4)} M`],hint:`Rearrange Keq expression to isolate [C], then take square root.`};}
    // ADVANCED MULTI-STEP
    if(t==='ice_quadratic'){
        // A + B ‚áĆ C, Keq given, both reactants start at same concentration
        const Keq=r(0.5,8,3),init=r(0.5,2,2);
        // x/(init-x)^2 = Keq ‚Üí quadratic
        // Keq(init-x)^2 = x ‚Üí Keq*init^2 - 2Keq*init*x + Keq*x^2 = x
        // Keq*x^2 - (2Keq*init+1)*x + Keq*init^2 = 0
        const a=Keq,b=-(2*Keq*init+1),c_=Keq*init*init;
        const disc=b*b-4*a*c_,x=(-b-Math.sqrt(disc))/(2*a);
        const Ceq=x;
        return{question:`For A+B‚áĆC with Keq=${Keq}, both [A]‚āÄ=[B]‚āÄ=${init} M and [C]‚āÄ=0. Find [C] at equilibrium. (Requires quadratic formula)`,given:`Keq=${Keq}, [A]‚āÄ=[B]‚āÄ=${init} M, [C]‚āÄ=0`,answer:Ceq,unit:'M',steps:[`ICE: [A]=${init}-x, [B]=${init}-x, [C]=x`,`Keq = x/(${init}-x)¬≤ = ${Keq}`,`Expand: ${Keq}x¬≤ - ${(2*Keq*init+1).toFixed(4)}x + ${(Keq*init*init).toFixed(4)} = 0`,`x = ${Ceq.toFixed(4)} M = [C]_eq`],hint:`Set up ICE, write Keq expression, rearrange to quadratic ax¬≤+bx+c=0, use quadratic formula.`};
    }
    if(t==='q_direction'){
        const A=r(0.3,1,3),B=r(0.3,1,3),C=r(0.1,0.5,3),D=r(0.1,0.5,3),Keq=r(1,10,3),Q=C*D/(A*B);
        return{question:`For A+B‚áĆC+D, Keq=${Keq}. Current concentrations: [A]=${A},[B]=${B},[C]=${C},[D]=${D} M. Calculate Q.`,given:`Keq=${Keq},[A]=${A},[B]=${B},[C]=${C},[D]=${D}`,answer:Q,unit:'(Q value)',steps:[`Q=[C][D]/([A][B])=(${C}√ó${D})/(${A}√ó${B})=${Q.toFixed(4)}`,`Q ${Q<Keq?'<':Q>Keq?'>':'='} Keq ‚Üí reaction goes ${Q<Keq?'forward':'reverse'}`],hint:`Q uses same expression as Keq but with current (not equilibrium) concentrations.`};
    }
    // keq_reverse: given Keq for forward, find Keq for reverse reaction
    const Keq_fwd=r(0.1,100,4),Keq_rev=1/Keq_fwd;
    return{question:`The equilibrium constant for A+B‚áĆC+D is Keq=${Keq_fwd}. What is the Keq for the reverse reaction C+D‚áĆA+B?`,given:`Keq(forward)=${Keq_fwd}`,answer:Keq_rev,unit:'',steps:[`Reversing a reaction inverts the equilibrium constant`,`Keq(reverse) = 1/Keq(forward) = 1/${Keq_fwd} = ${Keq_rev.toFixed(5)}`],hint:`For the reverse reaction, Keq_rev = 1 / Keq_forward.`};
}

        return{question:`Calculate the [OH‚ĀĽ] for a solution where [H‚Āļ] = ${co} √ó 10^${exp} M. Is the solution acidic, basic, or neutral?`,given:`[H‚Āļ] = ${co} √ó 10^${exp} M\nKw = [H‚Āļ][OH‚ĀĽ] = 1.0 √ó 10‚ĀĽ¬Ļ‚Āī`,answer:OH,unit:'M',steps:[`[OH‚ĀĽ] = Kw / [H‚Āļ] = 1.0√ó10‚ĀĽ¬Ļ‚Āī / (${co}√ó10^${exp}) = ${OH.toExponential(3)} M`,`Since [H‚Āļ] ${acid?'>':'<'} 1.0√ó10‚ĀĽ‚Ā∑, the solution is ${acid?'acidic':'basic'}`],hint:`[OH‚ĀĽ] = Kw / [H‚Āļ] = 1.0 √ó 10‚ĀĽ¬Ļ‚Āī / [H‚Āļ]`};

    if(t==='remain_time'){const n=r(1,5),time=n*iso.t,m0=r(100,800,1),rem=m0*Math.pow(0.5,n);return{question:`How much of a ${m0} g sample of ${iso.n} remains after ${time} ${iso.u}? (t¬Ĺ=${iso.t} ${iso.u})`,given:`m‚āÄ=${m0} g, t=${time} ${iso.u}, t¬Ĺ=${iso.t} ${iso.u}`,answer:rem,unit:'g',steps:[`n=t/t¬Ĺ=${time}/${iso.t}=${n} half-lives`,`remaining=${m0}√ó(0.5)^${n}=${rem.toFixed(4)} g`],hint:`First find n = t/t¬Ĺ, then remaining = m‚āÄ√ó(¬Ĺ)^n`};}
    if(t==='count_halflives'){const n=r(2,5),m0=r(200,1000,1),rem=m0*Math.pow(0.5,n);return{question:`A ${m0} g sample of ${iso.n} decays to ${rem.toFixed(2)} g. How many half-lives have passed?`,given:`m‚āÄ=${m0} g, remaining=${rem.toFixed(2)} g`,answer:n,unit:'half-lives',steps:[`fraction=${rem.toFixed(2)}/${m0}=(¬Ĺ)^n ‚Üí n=${n}`],hint:`n = log(remaining/initial) / log(0.5)`};}
    if(t==='fraction'){const n=r(1,5),f=Math.pow(0.5,n);return{question:`What fraction of a sample remains after ${n} half-lives?`,given:`n=${n}`,answer:f,unit:'',steps:[`fraction=(¬Ĺ)^${n}=${f}`],hint:`After each half-life, exactly half remains.`};}
    // ADVANCED MULTI-STEP
    if(t==='decay_constant'){const lambda=Math.log(2)/iso.t;return{question:`Calculate the decay constant őĽ for ${iso.n} (t¬Ĺ=${iso.t} ${iso.u}). Then confirm: what fraction remains after 1 half-life using e^(‚ąíőĽt)? Enter őĽ as your answer.`,given:`t¬Ĺ=${iso.t} ${iso.u}`,answer:lambda,unit:iso.u+'‚ĀĽ¬Ļ',steps:[`őĽ=ln(2)/t¬Ĺ=0.6931/${iso.t}=${lambda.toExponential(4)} ${iso.u}‚ĀĽ¬Ļ`,`Check: e^(‚ąíőĽ√ót¬Ĺ)=e^(‚ąí0.6931)=0.5 ‚úď`],hint:`őĽ = ln(2)/t¬Ĺ = 0.6931/t¬Ĺ`};}
    if(t==='find_age'){
        // Given remaining fraction, find age
        const frac=r(0.05,0.8,3),age=-Math.log(frac)/Math.log(2)*iso.t;
        return{question:`A sample of ${iso.n} (t¬Ĺ=${iso.t} ${iso.u}) has decayed to ${(frac*100).toFixed(1)}% of its original amount. How old is the sample?`,given:`Fraction remaining=${frac}, t¬Ĺ=${iso.t} ${iso.u}`,answer:age,unit:iso.u,steps:[`n=log(${frac})/log(0.5)=${(-Math.log(frac)/Math.log(2)).toFixed(4)} half-lives`,`Age=n√ót¬Ĺ=${(-Math.log(frac)/Math.log(2)).toFixed(4)}√ó${iso.t}=${age.toFixed(2)} ${iso.u}`],hint:`n = log(fraction)/log(0.5), then age = n √ó t¬Ĺ.`};
    }
    // remain_then_lambda: given m‚āÄ and t, find remaining mass then őĽ
    const t_elapsed=r(1,4)*iso.t,m0=r(100,500,1),n_hl=t_elapsed/iso.t,rem=m0*Math.pow(0.5,n_hl),lambda=Math.log(2)/iso.t;
    return{question:`A ${m0} g sample of ${iso.n} (t¬Ĺ=${iso.t} ${iso.u}) has been decaying for ${t_elapsed} ${iso.u}. (1) How much remains? (2) What is őĽ? Enter the remaining mass as your answer.`,given:`m‚āÄ=${m0} g, t=${t_elapsed} ${iso.u}, t¬Ĺ=${iso.t} ${iso.u}`,answer:rem,unit:'g',steps:[`Step 1: n=${t_elapsed}/${iso.t}=${n_hl} half-lives`,`Step 2: remaining=${m0}√ó(0.5)^${n_hl}=${rem.toFixed(3)} g`,`Step 3: őĽ=ln(2)/t¬Ĺ=${lambda.toExponential(4)} ${iso.u}‚ĀĽ¬Ļ`],hint:`n=t/t¬Ĺ first, then remaining=m‚āÄ√ó(¬Ĺ)^n. Advanced: also know őĽ=ln2/t¬Ĺ.`};
}

function checkAnswer(){
    const ua=parseFloat(document.getElementById('answerInput').value);
    if(isNaN(ua)){alert('Please enter a number');return;}
    stats.a++;
    const tol=Math.max(Math.abs(prob.answer)*0.02,0.001);
    const ok=Math.abs(ua-prob.answer)<=tol;
    if(ok)stats.c++;
    updateStats();
    const fb=document.getElementById('feedback');
    const ans=Math.abs(prob.answer)<1e-4&&prob.answer!==0?prob.answer.toExponential(4):parseFloat(prob.answer.toFixed(4));
    fb.className='feedback '+(ok?'correct':'incorrect');
    fb.innerHTML=`<div class="fb-title">${ok?'‚úď Correct!':'‚úó Not quite'}</div>${!ok?`<p>Your answer: ${ua} ${prob.unit}</p>`:''}<p>Correct answer: ${ans} ${chemFmt(prob.unit)}</p><div class="solution"><h4>Solution Steps:</h4>${prob.steps.map(s=>`<div class="step">${chemFmt(s)}</div>`).join('')}</div>`;
}

function showHint(){
    if(hinted)return;
    hinted=true;
    document.getElementById('feedback').innerHTML=`<div class="hint-box"><div class="given-data">${chemFmt(prob.given.replace(/\n/g,'<br>'))}</div><br>ūüí° ${chemFmt(prob.hint)}</div>`;
}

function updateStats(){
    document.getElementById('sAttempted').textContent=stats.a;
    document.getElementById('sCorrect').textContent=stats.c;
    document.getElementById('sAccuracy').textContent=stats.a>0?(stats.c/stats.a*100).toFixed(0)+'%':'‚ÄĒ';
}

document.getElementById('answerInput').addEventListener('keypress',e=>{if(e.key==='Enter')checkAnswer();});
