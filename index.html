<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chem Practice</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Crimson+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e27; --bg2: #151b3d; --card: #1a2351;
            --blue: #4a9eff; --cyan: #00d4ff; --yellow: #ffd700;
            --text: #e8edf5; --muted: #a8b5d1; --border: #2d3a5f;
            --ok: #00ff88; --err: #ff4466;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { height:100%; overflow:hidden; }
        body { font-family:'Crimson Pro',serif; background:var(--bg); color:var(--text); }

        .stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
        .star { position:absolute; width:2px; height:2px; background:var(--cyan); border-radius:50%; animation:twinkle 3s infinite; }
        @keyframes twinkle { 0%,100%{opacity:.2} 50%{opacity:1} }

        /* ── TOP BAR ── */
        .topbar {
            position:relative; z-index:1;
            display:flex; align-items:center; justify-content:space-between;
            padding:14px 24px;
            background:var(--bg2); border-bottom:2px solid var(--border);
        }
        .logo { font-family:'JetBrains Mono',monospace; font-size:1.4rem; font-weight:700;
            background:linear-gradient(135deg,var(--cyan),var(--blue));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .stats { display:flex; gap:30px; }
        .stat { text-align:center; }
        .stat-val { font-family:'JetBrains Mono',monospace; font-size:1.4rem; font-weight:700; color:var(--cyan); line-height:1; }
        .stat-lbl { font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }

        /* ── MAIN LAYOUT ── */
        .layout {
            position:relative; z-index:1;
            display:grid;
            grid-template-columns:240px 1fr;
            height:calc(100vh - 61px);
        }

        /* ── SIDEBAR ── */
        .sidebar {
            background:var(--bg2); border-right:2px solid var(--border);
            overflow-y:auto; padding:12px 10px; display:flex; flex-direction:column; gap:6px;
        }
        .sidebar-label {
            font-family:'JetBrains Mono',monospace; font-size:0.65rem; text-transform:uppercase;
            letter-spacing:2px; color:var(--muted); padding:4px 8px 8px;
        }
        .unit-btn {
            display:flex; align-items:center; gap:10px;
            padding:10px 12px; border-radius:10px; cursor:pointer;
            background:var(--card); border:2px solid transparent;
            transition:all .25s ease; font-family:'JetBrains Mono',monospace;
            font-size:0.82rem; font-weight:600; color:var(--text);
        }
        .unit-btn:hover { border-color:var(--blue); transform:translateX(3px); }
        .unit-btn.active { border-color:var(--cyan); background:linear-gradient(135deg,var(--card),#1e2a5a); color:var(--cyan); }
        .unit-btn .icon { font-size:1.1rem; flex-shrink:0; }
        .unit-btn .name { flex:1; }

        /* ── PROBLEM PANEL ── */
        .panel { overflow-y:auto; padding:24px 28px; display:flex; flex-direction:column; gap:16px; }

        .placeholder {
            flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
            color:var(--muted); font-family:'JetBrains Mono',monospace; gap:12px; text-align:center;
        }
        .placeholder .big { font-size:3rem; }
        .placeholder p { font-size:0.85rem; letter-spacing:1px; }

        .unit-header {
            display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
        }
        .unit-title-lbl {
            font-family:'JetBrains Mono',monospace; font-size:0.8rem; text-transform:uppercase;
            letter-spacing:2px; color:var(--cyan);
        }
        .diff-row { display:flex; gap:8px; }
        .diff-btn {
            padding:7px 16px; background:var(--card); border:2px solid var(--border);
            border-radius:8px; color:var(--muted); font-family:'JetBrains Mono',monospace;
            font-size:0.8rem; font-weight:600; cursor:pointer; transition:all .2s;
        }
        .diff-btn:hover { border-color:var(--blue); color:var(--text); }
        .diff-btn.active { background:var(--blue); border-color:var(--blue); color:var(--bg); }

        .problem-box {
            background:var(--card); border-left:4px solid var(--cyan);
            border-radius:12px; padding:22px 24px; font-size:1.15rem; line-height:1.75;
        }
        .given-data {
            background:rgba(74,158,255,.1); border-radius:8px; padding:12px 14px;
            margin-top:12px; font-family:'JetBrains Mono',monospace; font-size:.88rem; line-height:1.7;
        }

        .answer-row { display:flex; gap:12px; }
        input[type=number] {
            flex:1; padding:13px 18px; background:var(--bg); border:2px solid var(--border);
            border-radius:10px; color:var(--text); font-family:'JetBrains Mono',monospace;
            font-size:1rem; transition:all .2s;
        }
        input[type=number]:focus { outline:none; border-color:var(--cyan); box-shadow:0 0 0 3px rgba(0,212,255,.15); }

        .btn {
            padding:13px 28px; background:linear-gradient(135deg,var(--blue),var(--cyan));
            border:none; border-radius:10px; color:var(--bg); font-family:'JetBrains Mono',monospace;
            font-size:.9rem; font-weight:700; cursor:pointer; transition:all .2s;
            text-transform:uppercase; letter-spacing:.5px; white-space:nowrap;
        }
        .btn:hover { transform:translateY(-2px); box-shadow:0 6px 18px rgba(74,158,255,.4); }
        .btn:active { transform:translateY(0); }
        .btn-sec {
            background:var(--card); border:2px solid var(--border); color:var(--text);
        }
        .btn-sec:hover { border-color:var(--blue); box-shadow:0 6px 18px rgba(74,158,255,.2); }
        .btn-hint {
            background:transparent; border:2px dashed var(--border); color:var(--muted);
        }
        .btn-hint:hover { border-color:var(--yellow); color:var(--yellow); }

        .action-row { display:flex; gap:12px; }

        .feedback { border-radius:12px; padding:18px; animation:fadeIn .3s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
        .feedback.correct { background:rgba(0,255,136,.12); border:2px solid var(--ok); }
        .feedback.incorrect { background:rgba(255,68,102,.12); border:2px solid var(--err); }
        .fb-title { font-family:'JetBrains Mono',monospace; font-size:1.1rem; font-weight:700; margin-bottom:8px; }
        .solution { background:var(--card); border-radius:10px; padding:16px; margin-top:12px; }
        .solution h4 { color:var(--cyan); font-family:'JetBrains Mono',monospace; font-size:.85rem; margin-bottom:10px; }
        .step { margin:8px 0; padding-left:16px; border-left:3px solid var(--border); font-size:.95rem; }
        .hint-box { background:rgba(255,215,0,.08); border:2px solid var(--yellow); border-radius:10px; padding:14px; font-size:.95rem; }

        /* ── MOBILE ── */
        @media(max-width:700px){
            html,body{ overflow:auto; }
            .layout{ grid-template-columns:1fr; height:auto; }
            .sidebar{ flex-direction:row; flex-wrap:wrap; overflow-y:visible; border-right:none; border-bottom:2px solid var(--border); }
            .unit-btn{ flex:0 0 calc(50% - 6px); }
            .panel{ padding:16px; }
            .stats{ gap:16px; }
        }
    </style>
</head>
<body>
<div class="stars" id="stars"></div>

<!-- TOP BAR -->
<div class="topbar">
    <div class="logo">⚗ Chem Practice</div>
    <div class="stats">
        <div class="stat"><div class="stat-val" id="sAttempted">0</div><div class="stat-lbl">Attempted</div></div>
        <div class="stat"><div class="stat-val" id="sCorrect">0</div><div class="stat-lbl">Correct</div></div>
        <div class="stat"><div class="stat-val" id="sAccuracy">—</div><div class="stat-lbl">Accuracy</div></div>
    </div>
</div>

<!-- LAYOUT -->
<div class="layout">
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-label">Units</div>
        <div class="unit-btn" data-unit="measurements"><span class="icon">📏</span><span class="name">Measurements</span></div>
        <div class="unit-btn" data-unit="moles"><span class="icon">⚛️</span><span class="name">The Mole</span></div>
        <div class="unit-btn" data-unit="stoichiometry"><span class="icon">⚗️</span><span class="name">Stoichiometry</span></div>
        <div class="unit-btn" data-unit="gases"><span class="icon">💨</span><span class="name">Gases</span></div>
        <div class="unit-btn" data-unit="solutions"><span class="icon">🧪</span><span class="name">Solutions</span></div>
        <div class="unit-btn" data-unit="thermochemistry"><span class="icon">🔥</span><span class="name">Thermochemistry</span></div>
        <div class="unit-btn" data-unit="equilibrium"><span class="icon">⚖️</span><span class="name">Equilibrium</span></div>
        <div class="unit-btn" data-unit="acids"><span class="icon">🧫</span><span class="name">Acids &amp; Bases</span></div>
        <div class="unit-btn" data-unit="redox"><span class="icon">⚡</span><span class="name">Redox &amp; Electrochem</span></div>
        <div class="unit-btn" data-unit="nuclear"><span class="icon">☢️</span><span class="name">Nuclear Chemistry</span></div>
    </div>

    <!-- PROBLEM PANEL -->
    <div class="panel" id="panel">
        <div class="placeholder" id="placeholder">
            <div class="big">⚗️</div>
            <p>SELECT A UNIT FROM THE LEFT TO BEGIN</p>
        </div>
        <div id="problemUI" style="display:none; display:flex; flex-direction:column; gap:16px;">
            <div class="unit-header">
                <div class="unit-title-lbl" id="unitLbl"></div>
                <div class="diff-row">
                    <button class="diff-btn active" data-diff="basic">Basic</button>
                    <button class="diff-btn" data-diff="intermediate">Intermediate</button>
                    <button class="diff-btn" data-diff="advanced">Advanced ★</button>
                </div>
            </div>
            <div class="problem-box" id="problemBox"></div>
            <div class="answer-row">
                <input type="number" id="answerInput" placeholder="Enter your answer…" step="any">
                <button class="btn" onclick="checkAnswer()">Submit</button>
            </div>
            <div class="action-row">
                <button class="btn btn-sec" onclick="generateProblem()">New Problem</button>
                <button class="btn btn-hint" onclick="showHint()">💡 Hint</button>
            </div>
            <div id="feedback"></div>
        </div>
    </div>
</div>

<script>
// Stars
const sc=document.getElementById('stars');
for(let i=0;i<80;i++){const s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';s.style.animationDelay=Math.random()*3+'s';sc.appendChild(s);}

let unit=null,diff='basic',prob=null,stats={a:0,c:0},hinted=false;
const names={measurements:'Measurements',moles:'The Mole',stoichiometry:'Stoichiometry',gases:'Gases',solutions:'Solutions',thermochemistry:'Thermochemistry',equilibrium:'Equilibrium',acids:'Acids & Bases',redox:'Redox & Electrochem',nuclear:'Nuclear Chemistry'};

document.querySelectorAll('.unit-btn').forEach(b=>b.addEventListener('click',function(){
    document.querySelectorAll('.unit-btn').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');
    unit=this.dataset.unit;
    document.getElementById('placeholder').style.display='none';
    document.getElementById('problemUI').style.display='flex';
    document.getElementById('unitLbl').textContent='// '+names[unit];
    generateProblem();
}));

document.querySelectorAll('.diff-btn').forEach(b=>b.addEventListener('click',function(){
    document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');
    diff=this.dataset.diff;
    if(unit) generateProblem();
}));

function r(a,b,d=0){const v=Math.random()*(b-a)+a;return d===0?Math.round(v):parseFloat(v.toFixed(d));}

// Convert Unicode sub/superscripts → proper HTML tags so formulas render cleanly
function chemFmt(s){
    if(!s)return s;
    const sub={'₀':'0','₁':'1','₂':'2','₃':'3','₄':'4','₅':'5','₆':'6','₇':'7','₈':'8','₉':'9'};
    const sup={'⁰':'0','¹':'1','²':'2','³':'3','⁴':'4','⁵':'5','⁶':'6','⁷':'7','⁸':'8','⁹':'9','⁺':'+','⁻':'-'};
    return s
        .replace(/[₀-₉]/g, c => `<sub>${sub[c]||c}</sub>`)
        .replace(/[⁰-⁹⁺⁻]/g, c => `<sup>${sup[c]||c}</sup>`);
}

function generateProblem(){
    if(!unit)return;
    hinted=false;
    document.getElementById('feedback').innerHTML='';
    document.getElementById('answerInput').value='';
    const gens={measurements:genMeasure,moles:genMoles,stoichiometry:genStoich,gases:genGases,solutions:genSolutions,thermochemistry:genThermo,equilibrium:genEquil,acids:genAcids,redox:genRedox,nuclear:genNuclear};
    prob=gens[unit]();
    document.getElementById('problemBox').innerHTML=`<div>${chemFmt(prob.question)}</div>`;
}

// ══════════════════════════════════════════════════════════════════════════════
// MEASUREMENTS
// ══════════════════════════════════════════════════════════════════════════════
function genMeasure(){
    const basic=['sig_figs','si_convert','sci_notation'];
    const inter=['sig_figs','si_convert','sci_notation','density','percent_error'];
    const adv=['multistep_convert','density_chain','percent_error_chain'];
    const pool=diff==='basic'?basic:diff==='intermediate'?inter:adv;
    const t=pool[Math.floor(Math.random()*pool.length)];

    if(t==='sig_figs'){
        const nums=[
            {n:'101 g',sf:3,why:'Middle zero is trapped between nonzero digits — significant'},
            {n:'0.06 m',sf:1,why:'Leading zeros are never significant; only the 6 counts'},
            {n:'900. cm',sf:3,why:'Decimal point present: all three digits are significant'},
            {n:'40200 kg',sf:3,why:'No decimal point: trailing zeros are not significant'},
            {n:'0.0024 cm',sf:2,why:'Leading zeros not significant; only 2 and 4 count'},
            {n:'12.00 g',sf:4,why:'Trailing zeros after a decimal point are significant'},
            {n:'0.050 mL',sf:2,why:'Leading zero not sig; the 5 and trailing zero after decimal are sig'},
            {n:'1.0 × 10⁴ s',sf:2,why:'Only count digits in the coefficient: 1 and 0 are both significant'},
            {n:'108.04 torr',sf:5,why:'All digits including trapped zeros are significant'},
            {n:'3000 m',sf:1,why:'No decimal point: trailing zeros not significant'},
            {n:'60 g',sf:1,why:'No decimal point: trailing zero not significant'},
            {n:'12.24 g',sf:4,why:'All nonzero digits are always significant'},
            {n:'0.84 L',sf:2,why:'Leading zero not significant; 8 and 4 are both significant'},
            {n:'6020080 cm',sf:6,why:'Zeros trapped between nonzero digits are significant'},
            {n:'0.3 × 10⁶ atm',sf:1,why:'Only the coefficient digit matters; leading zeros are not significant'},
        ];
        const pick=nums[Math.floor(Math.random()*nums.length)];
        return{question:`How many significant figures are in the following measurement: ${pick.n}?`,given:`Measurement: ${pick.n}`,answer:pick.sf,unit:'sig figs',steps:[pick.why,`Answer: ${pick.sf} significant figure${pick.sf>1?'s':''}`],hint:`Rules: (1) Nonzero digits are always sig. (2) Zeros trapped between nonzero digits are sig. (3) Trailing zeros after a decimal are sig. (4) Leading zeros are never sig.`};
    }
    if(t==='si_convert'){
        const cvs=[
            {f:'km',to:'m',k:1000},{f:'cm',to:'m',k:0.01},{f:'mm',to:'m',k:0.001},
            {f:'kg',to:'g',k:1000},{f:'mg',to:'g',k:0.001},{f:'cg',to:'g',k:0.01},
            {f:'g',to:'kg',k:0.001},{f:'L',to:'mL',k:1000},{f:'mL',to:'L',k:0.001},
            {f:'cm',to:'mm',k:10},{f:'g',to:'cg',k:100},{f:'Dag',to:'g',k:10},
            {f:'Mg',to:'g',k:1e6},{f:'km',to:'cm',k:1e5}
        ];
        const cv=cvs[Math.floor(Math.random()*cvs.length)],val=r(1,500,2),ans=parseFloat((val*cv.k).toFixed(4));
        return{question:`Convert ${val} ${cv.f} to ${cv.to}.`,given:`${val} ${cv.f}\n1 ${cv.f} = ${cv.k} ${cv.to}`,answer:ans,unit:cv.to,steps:[`${val} ${cv.f} × (${cv.k} ${cv.to} / 1 ${cv.f}) = ${ans} ${cv.to}`],hint:`Multiply by the conversion factor. Larger unit → smaller unit means bigger number.`};
    }
    if(t==='sci_notation'){
        const exp=r(-4,5),co=r(1,9,2),val=co*Math.pow(10,exp);
        return{question:`Express ${co} × 10^${exp} as a standard (decimal) number.`,given:`${co} × 10^${exp}`,answer:val,unit:'',steps:[`Move the decimal ${Math.abs(exp)} place${Math.abs(exp)>1?'s':''} to the ${exp>=0?'right':'left'}`,`= ${val}`],hint:`Positive exponent → move decimal right. Negative exponent → move decimal left.`};
    }
    if(t==='density'){
        const subs=[
            {n:'aluminum',d:2.70},{n:'copper',d:8.96},{n:'lead',d:11.34},
            {n:'zinc',d:7.13},{n:'tin',d:6.99},{n:'silicon',d:2.33},
            {n:'water',d:1.00},{n:'ethanol',d:0.789},{n:'iron',d:7.87}
        ];
        const s=subs[Math.floor(Math.random()*subs.length)],sf=['density','mass','volume'][Math.floor(Math.random()*3)];
        if(sf==='density'){const m=r(10,200,1),v=r(5,100,1),d=m/v;return{question:`A substance has a mass of ${m} g and a volume of ${v} cm³. What is its density?`,given:`m = ${m} g\nV = ${v} cm³`,answer:d,unit:'g/cm³',steps:[`D = m/V = ${m} ÷ ${v} = ${d.toFixed(3)} g/cm³`],hint:`D = m/V`};}
        if(sf==='mass'){const v=r(5,50,1),m=parseFloat((s.d*v).toFixed(2));return{question:`What is the mass of ${v} cm³ of ${s.n}? (Density of ${s.n} = ${s.d} g/cm³)`,given:`V = ${v} cm³\nD = ${s.d} g/cm³`,answer:m,unit:'g',steps:[`m = D × V = ${s.d} × ${v} = ${m} g`],hint:`m = D × V`};}
        const m=r(10,200,1),v=parseFloat((m/s.d).toFixed(3));return{question:`What volume does ${m} g of ${s.n} occupy? (Density of ${s.n} = ${s.d} g/cm³)`,given:`m = ${m} g\nD = ${s.d} g/cm³`,answer:v,unit:'cm³',steps:[`V = m/D = ${m} ÷ ${s.d} = ${v} cm³`],hint:`V = m/D`};
    }
    if(t==='percent_error'){
        const th=r(10,100,2),dev=parseFloat((Math.random()*6-3).toFixed(2)),ex=parseFloat((th+dev).toFixed(2)),pe=Math.abs((ex-th)/th)*100;
        return{question:`The accepted value is ${th} and your experimental value is ${ex}. What is the percent error?`,given:`Accepted value = ${th}\nExperimental value = ${ex}`,answer:pe,unit:'%',steps:[`% error = |experimental − accepted| / accepted × 100`,`= |${ex} − ${th}| / ${th} × 100 = ${pe.toFixed(2)}%`],hint:`% error = (|experimental − accepted| / accepted) × 100`};
    }
    // ADVANCED MULTI-STEP
    if(t==='multistep_convert'){
        const kmh=r(40,140,1),ms=parseFloat((kmh*1000/3600).toFixed(3));
        return{question:`A car travels at ${kmh} km/h. Convert this speed to m/s.`,given:`${kmh} km/h\n1 km = 1000 m\n1 h = 3600 s`,answer:ms,unit:'m/s',steps:[`Step 1: km → m: ${kmh} × 1000 = ${kmh*1000} m/h`,`Step 2: h → s: ${kmh*1000} ÷ 3600 = ${ms} m/s`],hint:`Two conversion factors: × (1000 m / 1 km), then ÷ (3600 s / 1 h).`};
    }
    if(t==='density_chain'){
        const subs2=[{n:'iron',d:7.87},{n:'aluminum',d:2.70},{n:'copper',d:8.96},{n:'lead',d:11.34}];
        const s=subs2[Math.floor(Math.random()*subs2.length)],vol=r(50,500,1),massG=parseFloat((s.d*vol).toFixed(1)),massKg=parseFloat((massG/1000).toFixed(4));
        return{question:`A block of ${s.n} has a volume of ${vol} cm³ and a density of ${s.d} g/cm³. What is its mass in kg?`,given:`V = ${vol} cm³, D = ${s.d} g/cm³\n1 kg = 1000 g`,answer:massKg,unit:'kg',steps:[`Step 1: m = D × V = ${s.d} × ${vol} = ${massG} g`,`Step 2: g → kg: ${massG} ÷ 1000 = ${massKg} kg`],hint:`Find mass in grams first (m = D×V), then convert g → kg (÷ 1000).`};
    }
    const trials=[r(9,11,2),r(9,11,2),r(9,11,2)],theo=10.00,avg=parseFloat(((trials[0]+trials[1]+trials[2])/3).toFixed(3)),pe=parseFloat((Math.abs((avg-theo)/theo)*100).toFixed(3));
    return{question:`Three trials give values of ${trials[0]}, ${trials[1]}, and ${trials[2]}. The accepted value is ${theo}. Calculate the average, then find the percent error.`,given:`Trial 1 = ${trials[0]}, Trial 2 = ${trials[1]}, Trial 3 = ${trials[2]}\nAccepted value = ${theo}`,answer:pe,unit:'%',steps:[`Average = (${trials[0]} + ${trials[1]} + ${trials[2]}) / 3 = ${avg}`,`% error = |${avg} − ${theo}| / ${theo} × 100 = ${pe}%`],hint:`Step 1: average the three trials. Step 2: % error = |avg − accepted| / accepted × 100.`};
}

// ══════════════════════════════════════════════════════════════════════════════
// MOLES
// ══════════════════════════════════════════════════════════════════════════════
function genMoles(){
    const basic=['mass_to_mol','mol_to_mass','mol_to_part'];
    const inter=['mass_to_mol','mol_to_mass','mol_to_part','part_to_mol','mol_volume','percent_comp'];
    const adv=['mass_to_part','part_to_mass','percent_comp_adv'];
    const pool=diff==='basic'?basic:diff==='intermediate'?inter:adv;
    const t=pool[Math.floor(Math.random()*pool.length)];
    const cpds=[
        {n:'water',f:'H₂O',mm:18.015,ionic:false},
        {n:'sodium chloride',f:'NaCl',mm:58.44,ionic:true},
        {n:'carbon dioxide',f:'CO₂',mm:44.01,ionic:false},
        {n:'methane',f:'CH₄',mm:16.04,ionic:false},
        {n:'oxygen',f:'O₂',mm:32.00,ionic:false},
        {n:'ammonia',f:'NH₃',mm:17.03,ionic:false},
        {n:'calcium carbonate',f:'CaCO₃',mm:100.09,ionic:true},
        {n:'glucose',f:'C₆H₁₂O₆',mm:180.16,ionic:false},
        {n:'sulfuric acid',f:'H₂SO₄',mm:98.09,ionic:false},
        {n:'potassium chloride',f:'KCl',mm:74.55,ionic:true},
        {n:'sodium hydroxide',f:'NaOH',mm:40.00,ionic:true},
        {n:'magnesium oxide',f:'MgO',mm:40.30,ionic:true}
    ];
    const c=cpds[Math.floor(Math.random()*cpds.length)];
    const NA=6.022e23;

    if(t==='mass_to_mol'){const m=r(10,200,2),ans=m/c.mm;return{question:`How many moles are in ${m} g of ${c.n} (${c.f})?`,given:`Mass = ${m} g\nMolar mass of ${c.f} = ${c.mm} g/mol`,answer:ans,unit:'mol',steps:[`n = m/M = ${m} g ÷ ${c.mm} g/mol = ${ans.toFixed(4)} mol`],hint:`n = m/M`};}
    if(t==='mol_to_mass'){const n=r(0.5,10,3),ans=n*c.mm;return{question:`What is the mass of ${n} mol of ${c.n} (${c.f})?`,given:`n = ${n} mol\nMolar mass of ${c.f} = ${c.mm} g/mol`,answer:ans,unit:'g',steps:[`m = n × M = ${n} mol × ${c.mm} g/mol = ${ans.toFixed(3)} g`],hint:`m = n × M`};}
    if(t==='mol_to_part'){
        const n=r(0.5,5,3),pType=c.ionic?'formula units':'molecules',ans=n*NA;
        return{question:`How many ${pType} are in ${n} mol of ${c.n} (${c.f})?`,given:`n = ${n} mol\nAvogadro's number = 6.022 × 10²³ ${pType}/mol`,answer:ans,unit:pType,steps:[`particles = n × Nₐ = ${n} × 6.022×10²³ = ${ans.toExponential(4)} ${pType}`],hint:`particles = n × Nₐ (6.022 × 10²³)`};
    }
    if(t==='part_to_mol'){const p=parseFloat((r(1,15)*1e23).toExponential(2)),ans=p/NA;return{question:`How many moles are in ${p} molecules of ${c.n} (${c.f})?`,given:`Molecules = ${p}\nNₐ = 6.022 × 10²³ molecules/mol`,answer:ans,unit:'mol',steps:[`n = particles ÷ Nₐ = ${p} ÷ 6.022×10²³ = ${ans.toFixed(4)} mol`],hint:`n = particles ÷ Nₐ`};}
    if(t==='mol_volume'){
        const gases=[{n:'nitrogen gas',f:'N₂'},{n:'oxygen gas',f:'O₂'},{n:'carbon dioxide',f:'CO₂'},{n:'hydrogen gas',f:'H₂'},{n:'hydrogen chloride gas',f:'HCl'},{n:'water vapor',f:'H₂O'},{n:'sulfur dioxide',f:'SO₂'},{n:'carbon monoxide',f:'CO'}];
        const g=gases[Math.floor(Math.random()*gases.length)],flip=Math.random()<0.5;
        if(flip){const mol=r(0.5,15,2),vol=parseFloat((mol*22.4).toFixed(3));return{question:`What is the volume of ${mol} mol of ${g.n} (${g.f}) at STP?`,given:`n = ${mol} mol\n1 mol of any gas = 22.4 L at STP`,answer:vol,unit:'L',steps:[`V = n × 22.4 L/mol = ${mol} × 22.4 = ${vol} L`],hint:`At STP: V = n × 22.4 L/mol`};}
        const vol=r(5,200,1),mol=parseFloat((vol/22.4).toFixed(4));return{question:`How many moles of ${g.n} (${g.f}) occupy ${vol} L at STP?`,given:`V = ${vol} L\n1 mol of any gas = 22.4 L at STP`,answer:mol,unit:'mol',steps:[`n = V ÷ 22.4 = ${vol} ÷ 22.4 = ${mol} mol`],hint:`At STP: n = V ÷ 22.4 L/mol`};
    }
    if(t==='percent_comp'){
        const elems=[
            {cpd:'water',f:'H₂O',mm:18.015,el:'hydrogen',elMM:2.016},{cpd:'water',f:'H₂O',mm:18.015,el:'oxygen',elMM:15.999},
            {cpd:'carbon dioxide',f:'CO₂',mm:44.01,el:'oxygen',elMM:31.998},
            {cpd:'ammonia',f:'NH₃',mm:17.03,el:'nitrogen',elMM:14.007},{cpd:'ammonia',f:'NH₃',mm:17.03,el:'hydrogen',elMM:3.024},
            {cpd:'sulfuric acid',f:'H₂SO₄',mm:98.09,el:'sulfur',elMM:32.06},
            {cpd:'calcium carbonate',f:'CaCO₃',mm:100.09,el:'calcium',elMM:40.08},
            {cpd:'sodium chloride',f:'NaCl',mm:58.44,el:'sodium',elMM:22.99},
            {cpd:'sodium chloride',f:'NaCl',mm:58.44,el:'chlorine',elMM:35.45},
            {cpd:'sodium hydroxide',f:'NaOH',mm:40.00,el:'oxygen',elMM:16.00},
        ];
        const e=elems[Math.floor(Math.random()*elems.length)],pct=parseFloat((e.elMM/e.mm*100).toFixed(2));
        return{question:`Find the percent composition of ${e.el} in ${e.cpd} (${e.f}).`,given:`Molar mass of ${e.f} = ${e.mm} g/mol\nMass of ${e.el} per mole = ${e.elMM.toFixed(3)} g`,answer:pct,unit:'%',steps:[`% ${e.el} = (mass of element / molar mass) × 100`,`= ${e.elMM.toFixed(3)} / ${e.mm} × 100 = ${pct}%`],hint:`% composition = (mass of element per mole ÷ molar mass of compound) × 100`};
    }
    // ADVANCED MULTI-STEP
    if(t==='mass_to_part'){
        const m=r(10,150,2),mol=m/c.mm,part=mol*NA;
        return{question:`How many molecules are in ${m} g of ${c.n} (${c.f})?`,given:`Mass = ${m} g\nMolar mass = ${c.mm} g/mol\nNₐ = 6.022 × 10²³`,answer:part,unit:'molecules',steps:[`Step 1: moles = ${m} ÷ ${c.mm} = ${mol.toFixed(4)} mol`,`Step 2: molecules = ${mol.toFixed(4)} × 6.022×10²³ = ${part.toExponential(4)}`],hint:`Mass → moles (÷MM), then moles → molecules (×Nₐ). Two steps!`};
    }
    if(t==='part_to_mass'){
        const p=parseFloat((r(2,12)*1e23).toExponential(2)),mol=p/NA,m=mol*c.mm;
        return{question:`What is the mass (in grams) of ${p} molecules of ${c.n} (${c.f})?`,given:`Molecules = ${p}\nNₐ = 6.022 × 10²³\nMolar mass = ${c.mm} g/mol`,answer:m,unit:'g',steps:[`Step 1: moles = ${p} ÷ 6.022×10²³ = ${mol.toFixed(5)} mol`,`Step 2: mass = ${mol.toFixed(5)} × ${c.mm} = ${m.toFixed(4)} g`],hint:`Molecules → moles (÷Nₐ), then moles → mass (×MM). Two steps!`};
    }
    const elems2=[
        {cpd:'water',f:'H₂O',mm:18.015,el:'oxygen',elN:1},{cpd:'carbon dioxide',f:'CO₂',mm:44.01,el:'oxygen',elN:2},
        {cpd:'ammonia',f:'NH₃',mm:17.03,el:'hydrogen',elN:3},{cpd:'calcium carbonate',f:'CaCO₃',mm:100.09,el:'oxygen',elN:3},
    ];
    const e2=elems2[Math.floor(Math.random()*elems2.length)];
    const massS=r(50,300,1),molCpd=massS/e2.mm,molEl=molCpd*e2.elN;
    return{question:`A ${massS} g sample of ${e2.cpd} (${e2.f}) is fully decomposed. How many moles of ${e2.el} atoms are released? (There are ${e2.elN} ${e2.el} atom${e2.elN>1?'s':''} per formula unit.)`,given:`Mass = ${massS} g, MM(${e2.f}) = ${e2.mm} g/mol\n${e2.elN} ${e2.el} atom${e2.elN>1?'s':''} per formula unit`,answer:molEl,unit:`mol ${e2.el}`,steps:[`Step 1: moles of ${e2.f} = ${massS} ÷ ${e2.mm} = ${molCpd.toFixed(4)} mol`,`Step 2: moles ${e2.el} = ${molCpd.toFixed(4)} × ${e2.elN} = ${molEl.toFixed(4)} mol`],hint:`Find moles of compound first (÷MM), then multiply by atoms per formula unit.`};
}

// STOICHIOMETRY
// ══════════════════════════════════════════════════════════════════════════════
function genStoich(){
    const rxns=[
        {eq:'2H₂ + O₂ → 2H₂O',desc:'hydrogen reacts with oxygen to form water',r:[{n:'H₂',d:'hydrogen',mm:2.02,c:2},{n:'O₂',d:'oxygen',mm:32.00,c:1}],p:[{n:'H₂O',d:'water',mm:18.02,c:2}]},
        {eq:'N₂ + 3H₂ → 2NH₃',desc:'nitrogen and hydrogen form ammonia',r:[{n:'N₂',d:'nitrogen',mm:28.02,c:1},{n:'H₂',d:'hydrogen',mm:2.02,c:3}],p:[{n:'NH₃',d:'ammonia',mm:17.03,c:2}]},
        {eq:'CH₄ + 2O₂ → CO₂ + 2H₂O',desc:'methane combusts in oxygen',r:[{n:'CH₄',d:'methane',mm:16.04,c:1},{n:'O₂',d:'oxygen',mm:32.00,c:2}],p:[{n:'CO₂',d:'CO₂',mm:44.01,c:1}]},
        {eq:'2Na + Cl₂ → 2NaCl',desc:'sodium reacts with chlorine',r:[{n:'Na',d:'sodium',mm:22.99,c:2},{n:'Cl₂',d:'chlorine',mm:70.90,c:1}],p:[{n:'NaCl',d:'NaCl',mm:58.44,c:2}]},
        {eq:'C₃H₈ + 5O₂ → 3CO₂ + 4H₂O',desc:'propane combusts in oxygen',r:[{n:'C₃H₈',d:'propane',mm:44.10,c:1},{n:'O₂',d:'oxygen',mm:32.00,c:5}],p:[{n:'CO₂',d:'CO₂',mm:44.01,c:3}]}
    ];
    const rxn=rxns[Math.floor(Math.random()*rxns.length)];
    const basic=['m2m'],inter=['m2m','lr'],adv=['lr_yield'];
    const pool=diff==='basic'?basic:diff==='intermediate'?inter:adv;
    const t=pool[Math.floor(Math.random()*pool.length)];

    if(t==='m2m'){
        const re=rxn.r[0],pr=rxn.p[0],m=diff==='basic'?r(5,25):r(10,80,2);
        const mol=m/re.mm,pmol=mol*(pr.c/re.c),pm=pmol*pr.mm;
        return{question:`When ${rxn.desc}, how many grams of ${pr.d} are produced from ${m} g of ${re.d}?`,given:`Equation: ${rxn.eq}\nMM: ${re.n}=${re.mm}, ${pr.n}=${pr.mm} g/mol\nRatio: ${re.c} mol ${re.n} : ${pr.c} mol ${pr.n}`,answer:pm,unit:'g',steps:[`mol ${re.n}: ${m}/${re.mm}=${mol.toFixed(4)}`,`mol ${pr.n}: ×(${pr.c}/${re.c})=${pmol.toFixed(4)}`,`g ${pr.n}: ×${pr.mm}=${pm.toFixed(3)} g`],hint:`g→mol→mole ratio→mol→g`};
    }
    if(t==='lr'){
        const r1=rxn.r[0],r2=rxn.r[1],pr=rxn.p[0];
        const m1=r(10,40,2),m2=r(10,40,2),n1=m1/r1.mm,n2=m2/r2.mm;
        const rat1=n1/r1.c,rat2=n2/r2.c,lim=rat1<rat2?r1:r2,limN=rat1<rat2?n1:n2;
        const pm=limN*(pr.c/lim.c)*pr.mm;
        return{question:`When ${rxn.desc}, given ${m1} g of ${r1.d} and ${m2} g of ${r2.d}, how many grams of ${pr.d} are produced?`,given:`${r1.n}: ${m1} g (MM=${r1.mm})\n${r2.n}: ${m2} g (MM=${r2.mm})\nMM ${pr.n}=${pr.mm}`,answer:pm,unit:'g',steps:[`mol ${r1.n}=${n1.toFixed(4)} ÷${r1.c}=${rat1.toFixed(4)}`,`mol ${r2.n}=${n2.toFixed(4)} ÷${r2.c}=${rat2.toFixed(4)}`,`${lim.n} is limiting`,`Product: ${pm.toFixed(3)} g`],hint:`Divide moles by coefficient — smaller ratio = limiting reactant.`};
    }
    // ADVANCED: limiting reactant + percent yield combined (3 steps)
    const r1=rxn.r[0],r2=rxn.r.length>1?rxn.r[1]:rxn.r[0],pr=rxn.p[0];
    const m1=r(15,50,2),m2=r(15,50,2),n1=m1/r1.mm,n2=m2/r2.mm;
    const rat1=n1/r1.c,rat2=n2/r2.c;
    const lim=rat1<rat2?r1:r2,limN=rat1<rat2?n1:n2;
    const theo=limN*(pr.c/lim.c)*pr.mm;
    const actual=theo*(0.70+Math.random()*0.20),py=(actual/theo)*100;
    return{question:`When ${rxn.desc}, ${m1} g of ${r1.d} reacts with ${m2} g of ${r2.d}. If the actual yield of ${pr.d} is ${actual.toFixed(2)} g, what is the percent yield?`,given:`${r1.n}: ${m1} g (MM=${r1.mm})\n${r2.n}: ${m2} g (MM=${r2.mm})\nActual yield of ${pr.n}: ${actual.toFixed(2)} g`,answer:py,unit:'%',steps:[`Step 1 — find LR: ${r1.n} ratio=${rat1.toFixed(4)}, ${r2.n} ratio=${rat2.toFixed(4)} → ${lim.n} limits`,`Step 2 — theoretical yield: ${limN.toFixed(4)} × (${pr.c}/${lim.c}) × ${pr.mm} = ${theo.toFixed(3)} g`,`Step 3 — % yield: (${actual.toFixed(2)}/${theo.toFixed(3)}) × 100 = ${py.toFixed(2)}%`],hint:`Three steps: (1) find limiting reactant, (2) calculate theoretical yield, (3) % yield = actual/theoretical × 100.`};
}

// GASES
// ══════════════════════════════════════════════════════════════════════════════
function genGases(){
    const basic=['boyle','charles','gay_lussac'];
    const inter=['boyle','charles','gay_lussac','combined','ideal'];
    const adv=['ideal_stoich','combined_celsius','dalton_partial'];
    const pool=diff==='basic'?basic:diff==='intermediate'?inter:adv;
    const t=pool[Math.floor(Math.random()*pool.length)];

    if(t==='boyle'){const P1=r(1,5,2),V1=r(1,10,2),P2=r(1,8,2),V2=P1*V1/P2;return{question:`A gas is at ${P1} atm and ${V1} L. What volume does it occupy at ${P2} atm (constant T)?`,given:`P₁=${P1} atm, V₁=${V1} L, P₂=${P2} atm`,answer:V2,unit:'L',steps:[`P₁V₁=P₂V₂ → V₂=${P1}×${V1}/${P2}=${V2.toFixed(3)} L`],hint:`Boyle's Law: P₁V₁ = P₂V₂`};}
    if(t==='charles'){const V1=r(1,10,2),T1=r(250,400,1),T2=r(200,500,1),V2=V1*T2/T1;return{question:`A gas occupies ${V1} L at ${T1} K. What volume at ${T2} K (constant P)?`,given:`V₁=${V1} L, T₁=${T1} K, T₂=${T2} K`,answer:V2,unit:'L',steps:[`V₁/T₁=V₂/T₂ → V₂=${V1}×${T2}/${T1}=${V2.toFixed(3)} L`],hint:`Charles's Law: V₁/T₁ = V₂/T₂ (K required!)`};}
    if(t==='gay_lussac'){const P1=r(1,5,2),T1=r(250,400,1),T2=r(200,500,1),P2=P1*T2/T1;return{question:`A gas has pressure ${P1} atm at ${T1} K. What is its pressure at ${T2} K (constant V)?`,given:`P₁=${P1} atm, T₁=${T1} K, T₂=${T2} K`,answer:P2,unit:'atm',steps:[`P₁/T₁=P₂/T₂ → P₂=${P1}×${T2}/${T1}=${P2.toFixed(3)} atm`],hint:`Gay-Lussac's Law: P₁/T₁ = P₂/T₂`};}
    if(t==='combined'){const P1=r(1,4,2),V1=r(1,8,2),T1=r(250,400,1),P2=r(1,5,2),T2=r(200,500,1),V2=P1*V1*T2/(T1*P2);return{question:`Gas: P₁=${P1} atm, V₁=${V1} L, T₁=${T1} K. Find V₂ when P₂=${P2} atm, T₂=${T2} K.`,given:`P₁=${P1},V₁=${V1},T₁=${T1},P₂=${P2},T₂=${T2}`,answer:V2,unit:'L',steps:[`P₁V₁/T₁=P₂V₂/T₂ → V₂=${V2.toFixed(3)} L`],hint:`Combined Gas Law: P₁V₁/T₁ = P₂V₂/T₂`};}
    if(t==='ideal'){
        const R=0.08206,sf=['P','V','n','T'][Math.floor(Math.random()*4)];
        if(sf==='P'){const n=r(0.5,3,2),V=r(1,10,2),T=r(250,400,1),P=n*R*T/V;return{question:`Find pressure: ${n} mol gas, ${V} L, ${T} K.`,given:`n=${n},V=${V},T=${T},R=0.08206`,answer:P,unit:'atm',steps:[`P=nRT/V=(${n}×0.08206×${T})/${V}=${P.toFixed(3)} atm`],hint:`PV=nRT → P=nRT/V`};}
        if(sf==='V'){const n=r(0.5,3,2),P=r(1,4,2),T=r(250,400,1),V=n*R*T/P;return{question:`Find volume: ${n} mol, ${P} atm, ${T} K.`,given:`n=${n},P=${P},T=${T},R=0.08206`,answer:V,unit:'L',steps:[`V=nRT/P=(${n}×0.08206×${T})/${P}=${V.toFixed(3)} L`],hint:`PV=nRT → V=nRT/P`};}
        if(sf==='n'){const P=r(1,4,2),V=r(2,10,2),T=r(280,400,1),n=P*V/(R*T);return{question:`Find moles: ${P} atm, ${V} L, ${T} K.`,given:`P=${P},V=${V},T=${T},R=0.08206`,answer:n,unit:'mol',steps:[`n=PV/(RT)=(${P}×${V})/(0.08206×${T})=${n.toFixed(4)} mol`],hint:`PV=nRT → n=PV/RT`};}
        const P=r(1,4,2),V=r(2,10,2),n=r(0.5,3,2),T=P*V/(n*R);return{question:`Find temperature: ${P} atm, ${V} L, ${n} mol.`,given:`P=${P},V=${V},n=${n},R=0.08206`,answer:T,unit:'K',steps:[`T=PV/(nR)=(${P}×${V})/(${n}×0.08206)=${T.toFixed(2)} K`],hint:`PV=nRT → T=PV/(nR)`};
    }
    // ADVANCED MULTI-STEP
    if(t==='ideal_stoich'){
        // Given mass of compound, find volume of gas produced at given T and P
        const R=0.08206;
        const rxns2=[{eq:'CaCO₃ → CaO + CO₂',mm:100.09,gasN:'CO₂',ratio:1},{eq:'2H₂O₂ → 2H₂O + O₂',mm:34.01,gasN:'O₂',ratio:0.5}];
        const rxn2=rxns2[Math.floor(Math.random()*rxns2.length)];
        const mass=r(5,30,2),T=r(290,400,1),P=r(0.9,1.5,2);
        const molCompound=mass/rxn2.mm,molGas=molCompound*rxn2.ratio,V=molGas*R*T/P;
        return{question:`${mass} g of reactant decomposes: ${rxn2.eq}. What volume of ${rxn2.gasN} gas is produced at ${T} K and ${P} atm?`,given:`Mass=${mass} g, MM=${rxn2.mm} g/mol\nT=${T} K, P=${P} atm, R=0.08206 L·atm/mol·K`,answer:V,unit:'L',steps:[`Step 1: mol compound = ${mass}/${rxn2.mm} = ${molCompound.toFixed(4)} mol`,`Step 2: mol ${rxn2.gasN} = ${molCompound.toFixed(4)} × ${rxn2.ratio} = ${molGas.toFixed(4)} mol`,`Step 3: V = nRT/P = ${molGas.toFixed(4)}×0.08206×${T}/${P} = ${V.toFixed(3)} L`],hint:`Stoich first to get moles of gas, then use PV=nRT to find volume.`};
    }
    if(t==='combined_celsius'){
        // Give temps in °C, students must convert to K first
        const P1=r(1,4,2),V1=r(2,8,2),T1c=r(20,100),P2=r(1,5,2),T2c=r(100,300);
        const T1=T1c+273,T2=T2c+273,V2=P1*V1*T2/(T1*P2);
        return{question:`A gas is at ${P1} atm, ${V1} L, ${T1c}°C. Find V₂ when P₂=${P2} atm and T₂=${T2c}°C. Remember to convert °C to K!`,given:`P₁=${P1} atm, V₁=${V1} L, T₁=${T1c}°C\nP₂=${P2} atm, T₂=${T2c}°C`,answer:V2,unit:'L',steps:[`Step 1: T₁=${T1c}+273=${T1} K, T₂=${T2c}+273=${T2} K`,`Step 2: V₂=P₁V₁T₂/(T₁P₂)=${P1}×${V1}×${T2}/(${T1}×${P2})=${V2.toFixed(3)} L`],hint:`ALWAYS convert °C to K before using gas laws (add 273).`};
    }
    // dalton_partial: given total P and two partial P, find the third
    const Pa=r(0.15,0.40,3),Pb=r(0.10,0.35,3),Ptot=r(0.80,1.20,2),Pc=Ptot-Pa-Pb;
    return{question:`A gas mixture has total pressure ${Ptot} atm. Gas A has partial pressure ${Pa} atm and Gas B has ${Pb} atm. What is the partial pressure of Gas C?`,given:`P_total=${Ptot} atm, P_A=${Pa} atm, P_B=${Pb} atm`,answer:Pc,unit:'atm',steps:[`Dalton: P_total = P_A+P_B+P_C`,`P_C = ${Ptot}−${Pa}−${Pb} = ${Pc.toFixed(3)} atm`],hint:`P_total = sum of all partial pressures → isolate P_C.`};
}

// SOLUTIONS
// ══════════════════════════════════════════════════════════════════════════════
function genSolutions(){
    const basic=['molarity','dilution'];
    const inter=['molarity','dilution','mass_percent','find_vol'];
    const adv=['solid_then_dilute','mass_to_molarity','molality_chain'];
    const pool=diff==='basic'?basic:diff==='intermediate'?inter:adv;
    const t=pool[Math.floor(Math.random()*pool.length)];
    const sols=[{n:'NaCl',mm:58.44},{n:'KCl',mm:74.55},{n:'NaOH',mm:40.00},{n:'HCl',mm:36.46},{n:'CaCl₂',mm:110.98}];
    const s=sols[Math.floor(Math.random()*sols.length)];

    if(t==='molarity'){const mol=r(0.1,2,3),vol=r(100,1000)/1000,M=mol/vol;return{question:`What is the molarity of ${mol} mol of ${s.n} in ${vol*1000} mL of solution?`,given:`mol=${mol}, V=${vol*1000} mL`,answer:M,unit:'M',steps:[`M=n/V=${mol}/${vol}=${M.toFixed(4)} M`],hint:`M = mol ÷ L`};}
    if(t==='dilution'){const M1=r(1,6,2),V1=r(10,100,1),M2=r(0.1,1,2),V2=M1*V1/M2;return{question:`How many mL of ${M2} M can be prepared by diluting ${V1} mL of ${M1} M ${s.n}?`,given:`M₁=${M1}, V₁=${V1} mL, M₂=${M2}`,answer:V2,unit:'mL',steps:[`M₁V₁=M₂V₂ → V₂=${M1}×${V1}/${M2}=${V2.toFixed(2)} mL`],hint:`M₁V₁ = M₂V₂`};}
    if(t==='mass_percent'){const mSol=r(5,50,2),mSoln=r(100,500,1),mp=mSol/mSoln*100;return{question:`What is the mass percent of ${mSol} g ${s.n} in ${mSoln} g of solution?`,given:`m_solute=${mSol} g, m_solution=${mSoln} g`,answer:mp,unit:'%',steps:[`mass% = ${mSol}/${mSoln}×100=${mp.toFixed(3)}%`],hint:`mass% = (m_solute/m_solution)×100`};}
    if(t==='find_vol'){const M=r(0.5,3,2),mol=r(0.05,0.5,3),V=mol/M;return{question:`What volume (mL) of ${M} M ${s.n} contains ${mol} mol?`,given:`M=${M}, n=${mol}`,answer:V*1000,unit:'mL',steps:[`V=n/M=${mol}/${M}=${V.toFixed(4)} L = ${(V*1000).toFixed(2)} mL`],hint:`V=n/M, then × 1000 for mL`};}
    // ADVANCED MULTI-STEP
    if(t==='solid_then_dilute'){
        // Dissolve solid → initial solution → dilute to final volume
        const mass=r(5,30,2),V1=r(100,300)/1000,V2=r(500,2000)/1000;
        const mol=mass/s.mm,M1=mol/V1,M2=M1*V1/V2;
        return{question:`${mass} g of ${s.n} is dissolved in ${V1*1000} mL of water, then diluted to a total volume of ${V2*1000} mL. What is the final molarity?`,given:`Mass=${mass} g, MM=${s.mm} g/mol\nInitial volume=${V1*1000} mL, Final volume=${V2*1000} mL`,answer:M2,unit:'M',steps:[`Step 1: mol ${s.n} = ${mass}/${s.mm} = ${mol.toFixed(4)} mol`,`Step 2: M₁ = ${mol.toFixed(4)}/${V1} = ${M1.toFixed(4)} M`,`Step 3: M₁V₁=M₂V₂ → M₂ = ${M1.toFixed(4)}×${V1}/${V2} = ${M2.toFixed(4)} M`],hint:`Three steps: (1) grams→moles, (2) molarity of stock, (3) dilution formula M₁V₁=M₂V₂.`};
    }
    if(t==='mass_to_molarity'){
        // Given mass% and density, find molarity
        const mp=r(5,20,1),dens=r(1.0,1.3,3),mm=s.mm;
        // molarity = (mass% × density × 10) / molar mass
        const M=(mp*dens*10)/mm;
        return{question:`A ${s.n} solution is ${mp}% by mass with a density of ${dens} g/mL. What is its molarity?`,given:`Mass% = ${mp}%, Density = ${dens} g/mL, MM = ${mm} g/mol`,answer:M,unit:'M',steps:[`Assume 1 L of solution: mass = ${dens} g/mL × 1000 mL = ${dens*1000} g`,`Mass of ${s.n} = ${mp/100} × ${dens*1000} = ${(mp/100*dens*1000).toFixed(2)} g`,`mol = ${(mp/100*dens*1000).toFixed(2)}/${mm} = ${((mp/100*dens*1000)/mm).toFixed(4)} mol`,`M = mol/1 L = ${M.toFixed(4)} M`],hint:`Assume 1 L solution. Use density to find total mass, then mass% to find solute mass, then ÷MM.`};
    }
    // molality_chain: given mass solute and mass solvent, find molality then boiling point elevation
    const massS=r(5,30,2),massSolv=r(100,400,1),mol2=massS/s.mm,m2=mol2/(massSolv/1000);
    return{question:`${massS} g of ${s.n} is dissolved in ${massSolv} g of water. What is the molality of the solution?`,given:`m_solute=${massS} g, MM=${s.mm} g/mol\nm_solvent=${massSolv} g`,answer:m2,unit:'m',steps:[`Step 1: mol = ${massS}/${s.mm} = ${mol2.toFixed(4)} mol`,`Step 2: molality = ${mol2.toFixed(4)}/${massSolv/1000} kg = ${m2.toFixed(4)} m`],hint:`molality = moles of solute ÷ kilograms of SOLVENT (not solution).`};
}

// THERMOCHEMISTRY
// ══════════════════════════════════════════════════════════════════════════════
function genThermo(){
    const basic=['heating','cooling','phase_change'];
    const inter=['heating','cooling','phase_change','find_c','find_dT','calorimetry'];
    const adv=['multi_step','heating_then_phase','mixed_calorimetry'];
    const pool=diff==='basic'?basic:diff==='intermediate'?inter:adv;
    const t=pool[Math.floor(Math.random()*pool.length)];
    // Specific heat values from the worksheet table
    const subs=[
        {n:'water',c:4.186,Tf:0,Tb:100,Hf:334,Hv:2260},
        {n:'aluminum',c:0.900,Tf:660,Tb:2470,Hf:397,Hv:10500},
        {n:'iron',c:0.449,Tf:1538,Tb:2862,Hf:247,Hv:6090},
        {n:'copper',c:0.387,Tf:1085,Tb:2562,Hf:205,Hv:4730},
        {n:'silver',c:0.236,Tf:962,Tb:2162,Hf:111,Hv:2360},
        {n:'gold',c:0.130,Tf:1064,Tb:2807,Hf:63,Hv:1580},
        {n:'marble',c:0.858,Tf:0,Tb:1000,Hf:0,Hv:0}
    ];
    const sub=subs[Math.floor(Math.random()*subs.length)];

    if(t==='heating'){const m=r(50,300,1),T1=r(10,40),dT=r(10,60),q=m*sub.c*dT;return{question:`How much heat is required to raise the temperature of ${m} g of ${sub.n} from ${T1}°C to ${T1+dT}°C? (c = ${sub.c} J/g°C)`,given:`m = ${m} g\nc = ${sub.c} J/g°C\nΔT = ${dT}°C`,answer:q,unit:'J',steps:[`q = mcΔT = ${m} × ${sub.c} × ${dT} = ${q.toFixed(2)} J`],hint:`q = mcΔT`};}
    if(t==='cooling'){const m=r(50,300,1),T1=r(50,100),dT=r(10,50),q=m*sub.c*dT;return{question:`Calculate the quantity of heat released when ${m} g of ${sub.n} cools from ${T1}°C to ${T1-dT}°C. (c = ${sub.c} J/g°C)`,given:`m = ${m} g\nc = ${sub.c} J/g°C\nΔT = ${dT}°C`,answer:q,unit:'J',steps:[`q = mcΔT = ${m} × ${sub.c} × ${dT} = ${q.toFixed(2)} J`],hint:`q = mcΔT (use the magnitude of ΔT)`};}
    if(t==='phase_change'){
        if(sub.Hf===0)return genThermo();
        const m=r(50,150,1),pTs=['melting','vaporization'],pT=pTs[Math.floor(Math.random()*2)];
        const isMelt=pT==='melting',H=isMelt?sub.Hf:sub.Hv,T=isMelt?sub.Tf:sub.Tb;
        if(H===0)return genThermo();
        const q=m*H;
        return{question:`How much heat is absorbed when ${m} g of ${sub.n} at ${T}°C undergoes ${pT}? (ΔH = ${H} J/g)`,given:`m = ${m} g\nΔH_${isMelt?'fus':'vap'} = ${H} J/g`,answer:q,unit:'J',steps:[`q = m × ΔH = ${m} × ${H} = ${q.toFixed(1)} J`],hint:`Phase change: q = mΔH. Temperature stays constant — no ΔT needed.`};}
    if(t==='find_c'){const m=r(50,200,1),T1=r(20,40),dT=r(20,60),q=r(1000,8000,1),c=q/(m*dT);return{question:`A ${m} g sample of metal absorbs ${q} J of heat. Its temperature rises from ${T1}°C to ${T1+dT}°C. What is its specific heat capacity?`,given:`m = ${m} g\nq = ${q} J\nΔT = ${dT}°C`,answer:c,unit:'J/g°C',steps:[`c = q/(mΔT) = ${q} / (${m} × ${dT}) = ${c.toFixed(4)} J/g°C`],hint:`Rearrange q = mcΔT → c = q/(mΔT)`};}
    if(t==='find_dT'){const m=r(100,300,1),q=r(2000,8000,1),dT=q/(m*sub.c);return{question:`${m} g of ${sub.n} absorbs ${q} J of heat. By how many degrees Celsius does its temperature rise? (c = ${sub.c} J/g°C)`,given:`m = ${m} g\nq = ${q} J\nc = ${sub.c} J/g°C`,answer:dT,unit:'°C',steps:[`ΔT = q/(mc) = ${q} / (${m} × ${sub.c}) = ${dT.toFixed(3)}°C`],hint:`Rearrange q = mcΔT → ΔT = q/(mc)`};}
    if(t==='calorimetry'){
        const metals2=[{n:'aluminum',c:0.900},{n:'iron',c:0.449},{n:'copper',c:0.387}];
        const met2=metals2[Math.floor(Math.random()*metals2.length)];
        const mMet2=r(20,80,1),TMet2=r(150,300),mWat2=r(100,200,1),TWat2=r(15,30);
        const Tf2=(mMet2*met2.c*TMet2+mWat2*4.186*TWat2)/(mMet2*met2.c+mWat2*4.186);
        return{question:`If ${mMet2} g of ${met2.n} at ${TMet2}°C is mixed with ${mWat2} g of water at ${TWat2}°C, find the final temperature of the system. (c_${met2.n} = ${met2.c} J/g°C, c_water = 4.186 J/g°C)`,given:`${met2.n}: m = ${mMet2} g, c = ${met2.c} J/g°C, T = ${TMet2}°C\nWater: m = ${mWat2} g, c = 4.186 J/g°C, T = ${TWat2}°C`,answer:Tf2,unit:'°C',steps:[`Heat released by ${met2.n} = heat absorbed by water`,`m₁c₁(T₁−Tf) = m₂c₂(Tf−T₂)`,`Tf = (m₁c₁T₁ + m₂c₂T₂)/(m₁c₁ + m₂c₂) = ${Tf2.toFixed(2)}°C`],hint:`q_lost = q_gained → solve for Tf: Tf = (m₁c₁T₁ + m₂c₂T₂) / (m₁c₁ + m₂c₂)`};
    }
    // ADVANCED MULTI-STEP
    if(t==='multi_step'){
        const m=r(25,60,1),q1=m*2.093*10,q2=m*334,q3=m*4.186*100,q4=m*2260,q5=m*2.009*10,qT=q1+q2+q3+q4+q5;
        return{question:`Calculate the total heat needed to convert ${m} g of ice at −10°C to steam at 110°C.`,given:`m = ${m} g\nc_ice = 2.093 J/g°C, c_water = 4.186 J/g°C, c_steam = 2.009 J/g°C\nΔH_fus = 334 J/g, ΔH_vap = 2260 J/g`,answer:qT,unit:'J',steps:[`q₁ (heat ice −10→0°C): ${m}×2.093×10 = ${q1.toFixed(1)} J`,`q₂ (melt at 0°C): ${m}×334 = ${q2.toFixed(1)} J`,`q₃ (heat water 0→100°C): ${m}×4.186×100 = ${q3.toFixed(1)} J`,`q₄ (vaporize at 100°C): ${m}×2260 = ${q4.toFixed(1)} J`,`q₅ (heat steam 100→110°C): ${m}×2.009×10 = ${q5.toFixed(1)} J`,`Total = ${qT.toFixed(1)} J`],hint:`5 segments of a heating curve: heat solid, melt, heat liquid, vaporize, heat gas. Add all q values.`};
    }
    if(t==='heating_then_phase'){
        const m=r(50,200,1),T1=r(15,30),dTwarm=100-T1,qWarm=m*4.186*dTwarm;
        const mVap=r(10,Math.floor(m/2),1),qVap=mVap*2260,qTotal=qWarm+qVap;
        return{question:`${m} g of water at ${T1}°C is heated to 100°C, then ${mVap} g of it is vaporized. What is the total heat required? (c_water = 4.186 J/g°C, ΔH_vap = 2260 J/g)`,given:`m_total = ${m} g, T₁ = ${T1}°C → 100°C\nm_vaporized = ${mVap} g\nΔH_vap = 2260 J/g`,answer:qTotal,unit:'J',steps:[`Step 1 — heat ${m} g to boiling: q₁ = ${m}×4.186×${dTwarm} = ${qWarm.toFixed(1)} J`,`Step 2 — vaporize ${mVap} g: q₂ = ${mVap}×2260 = ${qVap.toFixed(1)} J`,`Total = ${qWarm.toFixed(1)} + ${qVap.toFixed(1)} = ${qTotal.toFixed(1)} J`],hint:`Two-step: (1) q = mcΔT for heating to 100°C, then (2) q = mΔH_vap for the phase change. Add both.`};
    }
    const metals=[{n:'aluminum',c:0.900},{n:'iron',c:0.449},{n:'copper',c:0.387}];
    const met=metals[Math.floor(Math.random()*metals.length)];
    const mMet=r(50,150,1),TMet=r(150,300),mWat=r(200,400,1),TWat=r(15,30);
    const Tf=(mMet*met.c*TMet+mWat*4.186*TWat)/(mMet*met.c+mWat*4.186);
    return{question:`${mMet} g of ${met.n} at ${TMet}°C is dropped into ${mWat} g of water at ${TWat}°C. What is the final equilibrium temperature? (c_${met.n} = ${met.c} J/g°C, c_water = 4.186 J/g°C)`,given:`${met.n}: m = ${mMet} g, c = ${met.c} J/g°C, T = ${TMet}°C\nWater: m = ${mWat} g, c = 4.186 J/g°C, T = ${TWat}°C`,answer:Tf,unit:'°C',steps:[`q_lost = q_gained`,`Tf = (m₁c₁T₁ + m₂c₂T₂) / (m₁c₁ + m₂c₂)`,`Tf = (${mMet}×${met.c}×${TMet} + ${mWat}×4.186×${TWat}) / (${mMet}×${met.c} + ${mWat}×4.186) = ${Tf.toFixed(2)}°C`],hint:`Heat lost by metal = heat gained by water. Tf = (m₁c₁T₁ + m₂c₂T₂) / (m₁c₁ + m₂c₂).`};
}

// EQUILIBRIUM
// ══════════════════════════════════════════════════════════════════════════════
function genEquil(){
    const basic=['keq_named','keq_coeff_named','ksp_from_sol'];
    const inter=['keq_named','keq_coeff_named','q_direction_named','ksp_from_sol','sol_from_ksp'];
    const adv=['q_direction_named','ksp_from_sol','sol_from_ksp','gibbs','ice_simple'];
    const pool=diff==='basic'?basic:diff==='intermediate'?inter:adv;
    const t=pool[Math.floor(Math.random()*pool.length)];

    // Named reactions from the worksheet
    const namedRxns=[
        {eq:'N₂(g) + O₂(g) ⇌ 2NO(g)',expr:'[NO]² / ([N₂][O₂])',
         lab:['N₂','O₂','NO'],coeff:[1,1,2],
         exprFn:(c)=>c[2]**2/(c[0]*c[1]),
         desc:'formation of nitrogen monoxide'},
        {eq:'2SO₂(g) + O₂(g) ⇌ 2SO₃(g)',expr:'[SO₃]² / ([SO₂]²[O₂])',
         lab:['SO₂','O₂','SO₃'],coeff:[2,1,2],
         exprFn:(c)=>c[2]**2/(c[0]**2*c[1]),
         desc:'formation of sulfur trioxide'},
        {eq:'N₂(g) + 3H₂(g) ⇌ 2NH₃(g)',expr:'[NH₃]² / ([N₂][H₂]³)',
         lab:['N₂','H₂','NH₃'],coeff:[1,3,2],
         exprFn:(c)=>c[2]**2/(c[0]*c[1]**3),
         desc:'Haber process (ammonia synthesis)'},
        {eq:'CO(g) + 2H₂(g) ⇌ CH₃OH(g)',expr:'[CH₃OH] / ([CO][H₂]²)',
         lab:['CO','H₂','CH₃OH'],coeff:[1,2,1],
         exprFn:(c)=>c[2]/(c[0]*c[1]**2),
         desc:'methanol synthesis'}
    ];

    if(t==='keq_named'){
        const rxn=namedRxns[Math.floor(Math.random()*namedRxns.length)];
        const c=[r(0.10,2.00,2),r(0.10,2.00,2),r(0.10,2.00,2)];
        const Keq=rxn.exprFn(c);
        const concs=rxn.lab.map((l,i)=>`[${l}] = ${c[i]} M`).join(', ');
        return{question:`For the reaction: ${rxn.eq}\nAt equilibrium: ${concs}. Calculate Keq.`,
            given:rxn.lab.map((l,i)=>`[${l}] = ${c[i]} M`).join('\n'),
            answer:Keq,unit:'',
            steps:[`Write the Keq expression: Keq = ${rxn.expr}`,
                `Keq = ${rxn.expr.replace(/\[([^\]]+)\]/g,(_,s)=>{const i=rxn.lab.indexOf(s);return i>=0?c[i].toString():'['+s+']'})} = ${Keq.toFixed(4)}`],
            hint:`Keq = products/reactants, each raised to its stoichiometric coefficient.`};
    }
    if(t==='keq_coeff_named'){
        const rxn=namedRxns[Math.floor(Math.random()*namedRxns.length)];
        // give Keq and two concentrations, solve for the third
        const c=[r(0.10,2.00,2),r(0.10,2.00,2),r(0.10,2.00,2)];
        const Keq=parseFloat(rxn.exprFn(c).toFixed(4));
        // ask student to verify / write expression
        return{question:`Write the Keq expression for: ${rxn.eq}\nThen calculate Keq given: ${rxn.lab.map((l,i)=>`[${l}] = ${c[i]} M`).join(', ')}.`,
            given:rxn.lab.map((l,i)=>`[${l}] = ${c[i]} M`).join('\n'),
            answer:Keq,unit:'',
            steps:[`Keq expression: Keq = ${rxn.expr}`,
                `Substitute: Keq = ${Keq.toFixed(4)}`],
            hint:`Coefficients in the balanced equation become exponents in the Keq expression.`};
    }
    if(t==='q_direction_named'){
        const rxn=namedRxns[Math.floor(Math.random()*namedRxns.length)];
        const Keq=parseFloat((Math.random()*0.09+0.001).toFixed(4));
        const c=[r(0.10,2.00,2),r(0.10,2.00,2),r(0.10,2.00,2)];
        const Q=parseFloat(rxn.exprFn(c).toFixed(4));
        const dir=Q<Keq?'forward (→)':Q>Keq?'reverse (←)':'at equilibrium';
        const dirExp=Q<Keq?'Q < Keq: more products must form → reaction shifts forward':
                     Q>Keq?'Q > Keq: too many products → reaction shifts reverse':
                     'Q = Keq: system is already at equilibrium';
        return{question:`At a certain temperature, Keq = ${Keq} for:\n${rxn.eq}\nThe current concentrations are: ${rxn.lab.map((l,i)=>`[${l}] = ${c[i]} M`).join(', ')}.\nCalculate Q and predict which direction the reaction will proceed.`,
            given:`Keq = ${Keq}\n`+rxn.lab.map((l,i)=>`[${l}] = ${c[i]} M`).join('\n'),
            answer:Q,unit:'(Q value)',
            steps:[`Q = ${rxn.expr}`,
                `Q = ${Q.toFixed(4)}`,
                dirExp,
                `Reaction proceeds ${dir}`],
            hint:`Calculate Q using current concentrations (same formula as Keq). Compare Q to Keq: Q < Keq → forward, Q > Keq → reverse.`};
    }

    // Ksp compounds: 1:1 (AB type) and 1:2 (AB₂ type)
    const ksp11=[
        {name:'zinc carbonate',f:'ZnCO₃',ions:'Zn²⁺ + CO₃²⁻',Ksp:1.46e-9},
        {name:'calcium sulfate',f:'CaSO₄',ions:'Ca²⁺ + SO₄²⁻',Ksp:5.1e-5},
        {name:'zinc sulfite',f:'ZnSO₃',ions:'Zn²⁺ + SO₃²⁻',Ksp:7.50e-9},
        {name:'copper(II) carbonate',f:'CuCO₃',ions:'Cu²⁺ + CO₃²⁻',Ksp:1.4e-10},
        {name:'silver chloride',f:'AgCl',ions:'Ag⁺ + Cl⁻',Ksp:1.77e-10},
        {name:'manganese(II) carbonate',f:'MnCO₃',ions:'Mn²⁺ + CO₃²⁻',Ksp:2.24e-11}
    ];
    const ksp12=[
        {name:'barium chloride',f:'BaCl₂',ions:'Ba²⁺ + 2Cl⁻',Ksp:2.4e-4,type:'AB2'},
        {name:'lead(II) chloride',f:'PbCl₂',ions:'Pb²⁺ + 2Cl⁻',Ksp:1.17e-5,type:'AB2'},
        {name:'copper(II) chloride',f:'CuCl₂',ions:'Cu²⁺ + 2Cl⁻',Ksp:1.57e-6,type:'AB2'},
        {name:'barium fluoride',f:'BaF₂',ions:'Ba²⁺ + 2F⁻',Ksp:1.84e-7,type:'AB2'}
    ];

    if(t==='ksp_from_sol'){
        const use12=Math.random()<0.4;
        if(use12){
            const cpd=ksp12[Math.floor(Math.random()*ksp12.length)];
            // solubility s mol/L → [Ba²⁺]=s, [Cl⁻]=2s → Ksp=s(2s)²=4s³
            const s=parseFloat((cpd.Ksp/4)**(1/3)*r(0.85,1.15,3));
            const Ksp=4*s**3;
            return{question:`${cpd.name[0].toUpperCase()+cpd.name.slice(1)} (${cpd.f}) dissolves in water at 25°C with a solubility of ${s.toExponential(2)} mol/L. Calculate Ksp.`,
                given:`Solubility of ${cpd.f} = ${s.toExponential(2)} mol/L\n${cpd.f} ⇌ ${cpd.ions}`,
                answer:Ksp,unit:'',
                steps:[`Dissolution: ${cpd.f} ⇌ ${cpd.ions}`,
                    `If solubility = s = ${s.toExponential(3)} mol/L`,
                    `[${cpd.ions.split('+')[0].trim()}] = s = ${s.toExponential(3)} M`,
                    `[${cpd.ions.split('+')[1].trim()}] = 2s = ${(2*s).toExponential(3)} M`,
                    `Ksp = [A²⁺][B⁻]² = (s)(2s)² = 4s³ = 4 × (${s.toExponential(3)})³ = ${Ksp.toExponential(3)}`],
                hint:`Set up the dissociation. If solubility = s, the 2:1 ion has concentration 2s. Ksp = s × (2s)² = 4s³.`};
        }
        const cpd=ksp11[Math.floor(Math.random()*ksp11.length)];
        const s=parseFloat(Math.sqrt(cpd.Ksp)*r(0.85,1.15,3));
        const Ksp=s*s;
        return{question:`${cpd.name[0].toUpperCase()+cpd.name.slice(1)} (${cpd.f}) has a solubility of ${s.toExponential(2)} mol/L at 22°C. Calculate Ksp.`,
            given:`Solubility of ${cpd.f} = ${s.toExponential(2)} mol/L\n${cpd.f} ⇌ ${cpd.ions}`,
            answer:Ksp,unit:'',
            steps:[`Dissolution: ${cpd.f} ⇌ ${cpd.ions}`,
                `[${cpd.ions.split('+')[0].trim()}] = ${s.toExponential(3)} M`,
                `[${cpd.ions.split('+')[1].trim()}] = ${s.toExponential(3)} M`,
                `Ksp = (${s.toExponential(3)})(${s.toExponential(3)}) = (${s.toExponential(3)})² = ${Ksp.toExponential(3)}`],
            hint:`For a 1:1 salt (AB ⇌ A⁺ + B⁻): both ions equal the solubility s. Ksp = s².`};
    }
    if(t==='sol_from_ksp'){
        const use12=Math.random()<0.4;
        if(use12){
            const cpd=ksp12[Math.floor(Math.random()*ksp12.length)];
            const s=(cpd.Ksp/4)**(1/3);
            return{question:`The Ksp for ${cpd.name} (${cpd.f}) is ${cpd.Ksp.toExponential(2)}. Calculate the solubility of ${cpd.f} in mol/L.`,
                given:`Ksp(${cpd.f}) = ${cpd.Ksp.toExponential(2)}\n${cpd.f} ⇌ ${cpd.ions}`,
                answer:s,unit:'mol/L',
                steps:[`Let solubility = s mol/L`,
                    `${cpd.f} ⇌ ${cpd.ions}`,
                    `[A²⁺] = s, [B⁻] = 2s`,
                    `Ksp = (s)(2s)² = 4s³`,
                    `s = (Ksp/4)^(1/3) = (${cpd.Ksp.toExponential(2)}/4)^(1/3) = ${s.toExponential(3)} mol/L`],
                hint:`For AB₂ salts: Ksp = 4s³ → s = (Ksp/4)^(1/3).`};
        }
        const cpd=ksp11[Math.floor(Math.random()*ksp11.length)];
        const s=Math.sqrt(cpd.Ksp);
        return{question:`The Ksp for ${cpd.name} (${cpd.f}) is ${cpd.Ksp.toExponential(2)}. Calculate the solubility of ${cpd.f} in mol/L.`,
            given:`Ksp(${cpd.f}) = ${cpd.Ksp.toExponential(2)}\n${cpd.f} ⇌ ${cpd.ions}`,
            answer:s,unit:'mol/L',
            steps:[`Let solubility = s mol/L`,
                `${cpd.f} ⇌ ${cpd.ions}`,
                `Ksp = s × s = s²`,
                `s = √(Ksp) = √(${cpd.Ksp.toExponential(2)}) = ${s.toExponential(3)} mol/L`],
            hint:`For a 1:1 salt: Ksp = s² → s = √Ksp.`};
    }
    if(t==='gibbs'){
        const scenarios=[
            {dH:-285,dS:-163,T:298,desc:'combustion of methanol'},
            {dH:-44,dS:-122,T:298,desc:'formation of ammonia (Haber process)'},
            {dH:+92,dS:+198,T:1000,desc:'decomposition of ammonia'},
            {dH:-572,dS:-11,T:500,desc:'oxidation of sulfur dioxide'},
            {dH:+178,dS:+160,T:298,desc:'decomposition of calcium carbonate'},
            {dH:-890,dS:-243,T:298,desc:'combustion of methane'},
            {dH:+100,dS:+300,T:450,desc:'endothermic decomposition'}
        ];
        const sc=scenarios[Math.floor(Math.random()*scenarios.length)];
        // add small random variation
        const dH=sc.dH+Math.round((Math.random()-0.5)*20);
        const dS=sc.dS+Math.round((Math.random()-0.5)*20);
        const T=sc.T+Math.round((Math.random()-0.5)*50/10)*10;
        const dG=dH-T*(dS/1000); // dS in J/mol·K → kJ: dG=dH(kJ)-T*dS(kJ/K)
        const spont=dG<0?'spontaneous (−ΔG)':'non-spontaneous (+ΔG)';
        return{question:`Calculate ΔG for a reaction where ΔH = ${dH} kJ/mol and ΔS = ${dS} J/mol·K at T = ${T} K. Is the reaction spontaneous?`,
            given:`ΔH = ${dH} kJ/mol\nΔS = ${dS} J/mol·K = ${(dS/1000).toFixed(3)} kJ/mol·K\nT = ${T} K\nΔG = ΔH − TΔS`,
            answer:dG,unit:'kJ/mol',
            steps:[`Convert ΔS: ${dS} J/mol·K ÷ 1000 = ${(dS/1000).toFixed(3)} kJ/mol·K`,
                `ΔG = ΔH − TΔS = ${dH} − (${T} × ${(dS/1000).toFixed(3)})`,
                `ΔG = ${dH} − (${(T*dS/1000).toFixed(2)}) = ${dG.toFixed(2)} kJ/mol`,
                `ΔG ${dG<0?'< 0':'> 0'} → reaction is ${spont}`],
            hint:`ΔG = ΔH − TΔS. Remember to convert ΔS from J to kJ (÷ 1000) before subtracting. Negative ΔG = spontaneous.`};
    }
    // ice_simple: basic ICE table with a named reaction (A⇌B style simplified)
    const Keq=parseFloat(r(0.01,4,4));
    const init=parseFloat(r(0.5,2,2));
    const x=Keq*init/(1+Keq);
    return{question:`For the reaction N₂(g) + O₂(g) ⇌ 2NO(g), Keq = ${Keq}.\nIf [N₂]₀ = ${init} M, [O₂]₀ = ${init} M, and [NO]₀ = 0, find [NO] at equilibrium.`,
        given:`Keq = ${Keq}\n[N₂]₀ = [O₂]₀ = ${init} M\n[NO]₀ = 0 M`,
        answer:2*x,unit:'M',
        steps:[`ICE table: let x = moles/L that react`,
            `[N₂] = ${init}−x, [O₂] = ${init}−x, [NO] = 2x`,
            `Keq = (2x)²/((${init}−x)(${init}−x)) = ${Keq}`,
            `Simplify: 4x²/(${init}−x)² = ${Keq}`,
            `2x/(${init}−x) = √${Keq} = ${Math.sqrt(Keq).toFixed(4)}`,
            `x = ${x.toFixed(4)} M → [NO] = 2x = ${(2*x).toFixed(4)} M`],
        hint:`Set up ICE table. Write Keq expression with exponents from coefficients. Solve for x.`};
}

    }
    if(t==='H_from_pH'){
        const pH=r(1,13,1),H=Math.pow(10,-pH);
        return{question:`A solution has a pH of ${pH}. Calculate [H⁺].`,given:`pH = ${pH}`,answer:H,unit:'M',steps:[`[H⁺] = 10^(−pH) = 10^(−${pH}) = ${H.toExponential(3)} M`],hint:`[H⁺] = 10^(−pH)`};
    }
    if(t==='strong_acid_ph'){
        const c=parseFloat((r(1,90)*0.001).toFixed(4)),pH=-Math.log10(c);
        const acids=['HCl','HNO₃','HBr','HClO₄'];
        const a=acids[Math.floor(Math.random()*acids.length)];
        return{question:`Calculate the pH of a ${c} M ${a} solution.`,given:`[${a}] = ${c} M\n(${a} is a strong acid — fully dissociates)`,answer:pH,unit:'',steps:[`[H⁺] = [${a}] = ${c} M`,`pH = −log(${c}) = ${pH.toFixed(2)}`],hint:`Strong acids fully dissociate: [H⁺] = molarity of the acid.`};
    }
    if(t==='strong_base_poh'){
        const c=parseFloat((r(1,90)*0.001).toFixed(4)),pOH=-Math.log10(c),pH=14-pOH;
        const bases=['NaOH','KOH'];const b=bases[Math.floor(Math.random()*2)];
        const askPOH=Math.random()<0.5;
        if(askPOH)return{question:`Calculate the pOH of a ${c} M ${b} solution.`,given:`[${b}] = ${c} M\n(strong base — fully dissociates)`,answer:pOH,unit:'',steps:[`[OH⁻] = [${b}] = ${c} M`,`pOH = −log(${c}) = ${pOH.toFixed(2)}`],hint:`Strong base: [OH⁻] = molarity. pOH = −log[OH⁻].`};
        return{question:`Calculate the pH of a ${c} M ${b} solution.`,given:`[${b}] = ${c} M\n(strong base — fully dissociates)`,answer:pH,unit:'',steps:[`[OH⁻] = [${b}] = ${c} M`,`pOH = −log(${c}) = ${pOH.toFixed(2)}`,`pH = 14 − pOH = 14 − ${pOH.toFixed(2)} = ${pH.toFixed(2)}`],hint:`Strong base → [OH⁻] = molarity → pOH = −log[OH⁻] → pH = 14 − pOH.`};
    }
    // ADVANCED
    if(t==='titration'){
        const scenarios=[
            {acid:'HCl',base:'NaOH',ratio:1},{acid:'HNO₃',base:'NaOH',ratio:1},
            {acid:'HCl',base:'KOH',ratio:1},{acid:'acetic acid (HC₂H₃O₂)',base:'NaOH',ratio:1},

    }
    if(t==='ka_calc'){
        const weakAcids=[
            {n:'acetic acid',f:'CH₃COOH',Ka:1.8e-5},{n:'formic acid',f:'HCOOH',Ka:1.8e-4},
            {n:'cyanic acid',f:'HOCN',Ka:3.5e-4},{n:'hydrofluoric acid',f:'HF',Ka:7.2e-4},
            {n:'uric acid',f:'HC₅H₃N₄O₃',Ka:1.3e-4}
        ];
        const wa=weakAcids[Math.floor(Math.random()*weakAcids.length)];
        const C=r(0.05,0.5,3),H=parseFloat((Math.sqrt(wa.Ka*C)).toExponential(4)),Ka_calc=(H*H)/(C-H);
        return{question:`${wa.n[0].toUpperCase()+wa.n.slice(1)} is a weak monoprotic acid. If the initial concentration is ${C} M and the equilibrium concentration of H₃O⁺ is ${H.toExponential(3)} M, calculate Ka for ${wa.n}.`,given:`Initial [${wa.f}] = ${C} M\nEquilibrium [H₃O⁺] = ${H.toExponential(3)} M`,answer:Ka_calc,unit:'',steps:[`At equilibrium: [${wa.f}] = ${C} − ${H.toExponential(3)} = ${(C-H).toExponential(4)} M`,`Ka = [H⁺][A⁻] / [HA] = (${H.toExponential(3)})² / ${(C-H).toExponential(4)} = ${Ka_calc.toExponential(3)}`],hint:`Ka = [H⁺][A⁻]/[HA]. At equilibrium: [H⁺]=[A⁻]=(given value), [HA]=initial−[H⁺].`};
    }
    if(t==='kb_calc'){
        const weakBases=[
            {n:'ammonia',f:'NH₃',Kb:1.8e-5},{n:'methylamine',f:'CH₃NH₂',Kb:4.4e-4},
            {n:'trimethylamine',f:'(CH₃)₃N',Kb:6.3e-5},{n:'isobutylamine',f:'(CH₃)₂CHCH₂NH₂',Kb:2.5e-4}

        const wb=weakBases[Math.floor(Math.random()*weakBases.length)];
        const C=r(0.05,0.5,3),OH=parseFloat((Math.sqrt(wb.Kb*C)).toExponential(4)),Kb_calc=(OH*OH)/(C-OH);
        return{question:`${wb.n[0].toUpperCase()+wb.n.slice(1)} is a weak base. If the initial concentration is ${C} M and the equilibrium concentration of OH⁻ is ${OH.toExponential(3)} M, calculate Kb for ${wb.n}.`,given:`Initial [${wb.f}] = ${C} M\nEquilibrium [OH⁻] = ${OH.toExponential(3)} M`,answer:Kb_calc,unit:'',steps:[`At equilibrium: [${wb.f}] = ${C} − ${OH.toExponential(3)} = ${(C-OH).toExponential(4)} M`,`Kb = [BH⁺][OH⁻] / [B] = (${OH.toExponential(3)})² / ${(C-OH).toExponential(4)} = ${Kb_calc.toExponential(3)}`],hint:`Kb = [BH⁺][OH⁻]/[B]. At equilibrium: [OH⁻]=[BH⁺]=(given), [B]=initial−[OH⁻].`};
    }
    if(t==='weak_acid_ph'){
        const Ka=parseFloat((Math.random()*9e-5+1e-5).toFixed(7)),C=r(0.05,0.5,3),H=Math.sqrt(Ka*C),pH=-Math.log10(H);
        return{question:`Calculate the pH of a ${C} M weak acid solution with Ka = ${Ka.toExponential(2)}. (Assume x ≪ C)`,given:`C = ${C} M\nKa = ${Ka.toExponential(2)}`,answer:pH,unit:'',steps:[`[H⁺] = √(Ka × C) = √(${Ka.toExponential(2)} × ${C}) = ${H.toExponential(3)} M`,`pH = −log(${H.toExponential(3)}) = ${pH.toFixed(3)}`],hint:`Weak acid approximation: [H⁺] ≈ √(Ka × C). Then pH = −log[H⁺].`};
    }
    const Kb=parseFloat((Math.random()*9e-5+1e-5).toFixed(7)),C=r(0.05,0.5,3),OH=Math.sqrt(Kb*C),pOH2=-Math.log10(OH),pH_wb=14-pOH2;
    return{question:`Calculate the pH of a ${C} M weak base solution with Kb = ${Kb.toExponential(2)}.`,given:`C = ${C} M\nKb = ${Kb.toExponential(2)}`,answer:pH_wb,unit:'',steps:[`[OH⁻] = √(Kb × C) = √(${Kb.toExponential(2)} × ${C}) = ${OH.toExponential(3)} M`,`pOH = −log(${OH.toExponential(3)}) = ${pOH2.toFixed(3)}`,`pH = 14 − ${pOH2.toFixed(3)} = ${pH_wb.toFixed(3)}`],hint:`Three steps: [OH⁻] = √(Kb×C) → pOH = −log[OH⁻] → pH = 14 − pOH.`};
}

const RT=[{ion:'Ag⁺',metal:'Ag',E:+0.80,n:1},{ion:'Hg²⁺',metal:'Hg',E:+0.85,n:2},{ion:'Cu²⁺',metal:'Cu',E:+0.34,n:2},{ion:'Fe³⁺',metal:'Fe',E:-0.04,n:3},{ion:'Pb²⁺',metal:'Pb',E:-0.13,n:2},{ion:'Ni²⁺',metal:'Ni',E:-0.25,n:2},{ion:'Co²⁺',metal:'Co',E:-0.29,n:2},{ion:'Cd²⁺',metal:'Cd',E:-0.40,n:2},{ion:'Fe²⁺',metal:'Fe',E:-0.41,n:2},{ion:'Cr³⁺',metal:'Cr',E:-0.74,n:3},{ion:'Zn²⁺',metal:'Zn',E:-0.76,n:2},{ion:'Mn²⁺',metal:'Mn',E:-1.18,n:2},{ion:'Al³⁺',metal:'Al',E:-1.66,n:3},{ion:'Mg²⁺',metal:'Mg',E:-2.37,n:2}];
const oxCpds=[{f:'LiBr',el:'Br',ans:-1,w:'Li=+1, neutral: Br=−1'},{f:'MgI₂',el:'I',ans:-1,w:'Mg=+2, neutral: I=−1'},{f:'H₂O',el:'O',ans:-2,w:'H=+1, neutral: O=−2'},{f:'H₂SO₄',el:'S',ans:+6,w:'H=+1,O=−2: S=+6'},{f:'Fe₂O₃',el:'Fe',ans:+3,w:'O=−2: Fe=+3'},{f:'KMnO₄',el:'Mn',ans:+7,w:'K=+1,O=−2: Mn=+7'},{f:'CuF',el:'Cu',ans:+1,w:'F=−1: Cu=+1'},{f:'WO₂',el:'W',ans:+4,w:'O=−2: W=+4'},{f:'CF₄',el:'C',ans:+4,w:'F=−1: C=+4'},{f:'CrF₃',el:'Cr',ans:+3,w:'F=−1: Cr=+3'},{f:'MnO₂',el:'Mn',ans:+4,w:'O=−2: Mn=+4'},{f:'N₂O₅',el:'N',ans:+5,w:'O=−2: N=+5'},{f:'Cr₂O₃',el:'Cr',ans:+3,w:'O=−2: Cr=+3'}];
const oxIons=[{f:'NO₃⁻',el:'N',ch:-1,ans:+5,w:'O=−2,charge=−1: N=+5'},{f:'SO₄²⁻',el:'S',ch:-2,ans:+6,w:'O=−2,charge=−2: S=+6'},{f:'MnO₄⁻',el:'Mn',ch:-1,ans:+7,w:'O=−2,charge=−1: Mn=+7'},{f:'CrO₄²⁻',el:'Cr',ch:-2,ans:+6,w:'O=−2,charge=−2: Cr=+6'},{f:'Cr₂O₇²⁻',el:'Cr',ch:-2,ans:+6,w:'O=−2,charge=−2: Cr=+6'},{f:'PO₄³⁻',el:'P',ch:-3,ans:+5,w:'O=−2,charge=−3: P=+5'},{f:'ClO₄⁻',el:'Cl',ch:-1,ans:+7,w:'O=−2,charge=−1: Cl=+7'}];

function pick2(){let i=Math.floor(Math.random()*RT.length),j=Math.floor(Math.random()*RT.length);while(j===i)j=Math.floor(Math.random()*RT.length);return[RT[i],RT[j]];}
const gcd=(a,b)=>b===0?a:gcd(b,a%b);
const lcm=(a,b)=>a*b/gcd(a,b);

function genRedox(){
    const basic=['ox_state','ecell'];
    const inter=['ox_state','ox_ion','ecell','ecell_identify'];
    const adv=['ox_state','ox_ion','ecell_identify','electrons','ecell_full'];
    const pool=diff==='basic'?basic:diff==='intermediate'?inter:adv;
    const t=pool[Math.floor(Math.random()*pool.length)];

    if(t==='ox_state'){const c=oxCpds[Math.floor(Math.random()*oxCpds.length)];return{question:`What is the oxidation state of ${c.el} in ${c.f}?`,given:`${c.f} — neutral compound\nRules: O=−2, H=+1, F=−1, alkali metals=+1, alkaline earth=+2`,answer:c.ans,unit:'',steps:[c.w,`Oxidation state of ${c.el} = ${c.ans}`],hint:`Assign known oxidation states first. All must sum to the overall charge (0 for neutral compounds).`};}
    if(t==='ox_ion'){const c=oxIons[Math.floor(Math.random()*oxIons.length)];return{question:`What is the oxidation state of ${c.el} in ${c.f}?`,given:`${c.f} — ion with charge ${c.ch}\nRules: O=−2, H=+1`,answer:c.ans,unit:'',steps:[c.w,`Oxidation state of ${c.el} = ${c.ans}`],hint:`Sum of oxidation states = ion charge (not zero for ions!)`};}
    if(t==='ecell'){const[m1,m2]=pick2(),cat=m1.E>m2.E?m1:m2,an=m1.E>m2.E?m2:m1,E=parseFloat((cat.E-an.E).toFixed(2));return{question:`Calculate E°cell for a cell with ${cat.metal} cathode and ${an.metal} anode.`,given:`E°(${cat.ion}/${cat.metal})=${cat.E} V\nE°(${an.ion}/${an.metal})=${an.E} V`,answer:E,unit:'V',steps:[`E°cell=E°cathode−E°anode=${cat.E}−(${an.E})=${E} V`],hint:`E°cell = E°cathode − E°anode`};}
    if(t==='ecell_identify'){const[m1,m2]=pick2(),cat=m1.E>m2.E?m1:m2,an=m1.E>m2.E?m2:m1,E=parseFloat((cat.E-an.E).toFixed(2));return{question:`A galvanic cell uses ${m1.metal} and ${m2.metal}. Which is the cathode? Enter E°cell (V).`,given:`E°(${m1.ion}/${m1.metal})=${m1.E} V\nE°(${m2.ion}/${m2.metal})=${m2.E} V`,answer:E,unit:'V',steps:[`Higher E° → cathode: ${cat.metal} (${cat.E} V)`,`${an.metal} is the anode (${an.E} V)`,`E°cell=${cat.E}−(${an.E})=${E} V`],hint:`Cathode = higher reduction potential. E°cell = E°cathode − E°anode.`};}
    if(t==='electrons'){const[m1,m2]=pick2(),cat=m1.E>m2.E?m1:m2,an=m1.E>m2.E?m2:m1,ne=lcm(cat.n,an.n);return{question:`In a galvanic cell with ${cat.metal} cathode and ${an.metal} anode, how many electrons are transferred per formula unit?`,given:`Cathode: ${cat.ion}+${cat.n}e⁻→${cat.metal}\nAnode: ${an.metal}→${an.ion}+${an.n}e⁻`,answer:ne,unit:'electrons',steps:[`Cathode needs ${cat.n}e⁻; Anode gives ${an.n}e⁻`,`LCM(${cat.n},${an.n})=${ne} electrons transferred`],hint:`Electrons gained = electrons lost. Find LCM of the two n values.`};}
    // ADVANCED MULTI-STEP: identify everything + E°cell + electrons
    const[m1,m2]=pick2(),cat=m1.E>m2.E?m1:m2,an=m1.E>m2.E?m2:m1;
    const E=parseFloat((cat.E-an.E).toFixed(2)),ne=lcm(cat.n,an.n);
    return{question:`A cell is built with ${m1.metal} and ${m2.metal}. (1) Identify cathode and anode. (2) Write the number of electrons transferred. (3) Enter E°cell as your answer.`,given:`E°(${m1.ion}/${m1.metal})=${m1.E} V\nE°(${m2.ion}/${m2.metal})=${m2.E} V`,answer:E,unit:'V',steps:[`Step 1: ${cat.metal}(${cat.E} V) > ${an.metal}(${an.E} V) → ${cat.metal}=CATHODE, ${an.metal}=ANODE`,`Step 2: LCM(${cat.n},${an.n})=${ne} electrons transferred`,`Step 3: E°cell=${cat.E}−(${an.E})=${E} V`],hint:`Compare E° values: higher=cathode. Then E°cell=E°cathode−E°anode.`};
}

// NUCLEAR

function genNuclear(){
    const basic=['remain_n','remain_time'];
    const inter=['remain_n','remain_time','count_halflives','fraction'];
    const adv=['decay_constant','find_age','remain_then_lambda'];
    const pool=diff==='basic'?basic:diff==='intermediate'?inter:adv;
    const t=pool[Math.floor(Math.random()*pool.length)];
    const isos=[{n:'C-14',t:5730,u:'years'},{n:'I-131',t:8.02,u:'days'},{n:'Ra-226',t:1600,u:'years'},{n:'Po-210',t:138.4,u:'days'},{n:'Sr-90',t:28.8,u:'years'},{n:'Tc-99m',t:6.01,u:'hours'}];
    const iso=isos[Math.floor(Math.random()*isos.length)];

    if(t==='remain_n'){const n=r(1,5),m0=r(100,1000,1),rem=m0*Math.pow(0.5,n);return{question:`A ${m0} g sample of ${iso.n} undergoes ${n} half-lives. How much remains?`,given:`m₀=${m0} g, n=${n} half-lives`,answer:rem,unit:'g',steps:[`remaining=m₀×(½)^n=${m0}×(0.5)^${n}=${rem.toFixed(4)} g`],hint:`remaining = initial × (½)^n`};}
    if(t==='remain_time'){const n=r(1,5),time=n*iso.t,m0=r(100,800,1),rem=m0*Math.pow(0.5,n);return{question:`How much of a ${m0} g sample of ${iso.n} remains after ${time} ${iso.u}? (t½=${iso.t} ${iso.u})`,given:`m₀=${m0} g, t=${time} ${iso.u}, t½=${iso.t} ${iso.u}`,answer:rem,unit:'g',steps:[`n=t/t½=${time}/${iso.t}=${n} half-lives`,`remaining=${m0}×(0.5)^${n}=${rem.toFixed(4)} g`],hint:`First find n = t/t½, then remaining = m₀×(½)^n`};}
    if(t==='count_halflives'){const n=r(2,5),m0=r(200,1000,1),rem=m0*Math.pow(0.5,n);return{question:`A ${m0} g sample of ${iso.n} decays to ${rem.toFixed(2)} g. How many half-lives have passed?`,given:`m₀=${m0} g, remaining=${rem.toFixed(2)} g`,answer:n,unit:'half-lives',steps:[`fraction=${rem.toFixed(2)}/${m0}=(½)^n → n=${n}`],hint:`n = log(remaining/initial) / log(0.5)`};}
    if(t==='fraction'){const n=r(1,5),f=Math.pow(0.5,n);return{question:`What fraction of a sample remains after ${n} half-lives?`,given:`n=${n}`,answer:f,unit:'',steps:[`fraction=(½)^${n}=${f}`],hint:`After each half-life, exactly half remains.`};}
    // ADVANCED MULTI-STEP
    if(t==='decay_constant'){const lambda=Math.log(2)/iso.t;return{question:`Calculate the decay constant λ for ${iso.n} (t½=${iso.t} ${iso.u}). Then confirm: what fraction remains after 1 half-life using e^(−λt)? Enter λ as your answer.`,given:`t½=${iso.t} ${iso.u}`,answer:lambda,unit:iso.u+'⁻¹',steps:[`λ=ln(2)/t½=0.6931/${iso.t}=${lambda.toExponential(4)} ${iso.u}⁻¹`,`Check: e^(−λ×t½)=e^(−0.6931)=0.5 ✓`],hint:`λ = ln(2)/t½ = 0.6931/t½`};}
    if(t==='find_age'){
        // Given remaining fraction, find age
        const frac=r(0.05,0.8,3),age=-Math.log(frac)/Math.log(2)*iso.t;
        return{question:`A sample of ${iso.n} (t½=${iso.t} ${iso.u}) has decayed to ${(frac*100).toFixed(1)}% of its original amount. How old is the sample?`,given:`Fraction remaining=${frac}, t½=${iso.t} ${iso.u}`,answer:age,unit:iso.u,steps:[`n=log(${frac})/log(0.5)=${(-Math.log(frac)/Math.log(2)).toFixed(4)} half-lives`,`Age=n×t½=${(-Math.log(frac)/Math.log(2)).toFixed(4)}×${iso.t}=${age.toFixed(2)} ${iso.u}`],hint:`n = log(fraction)/log(0.5), then age = n × t½.`};
    }
    // remain_then_lambda: given m₀ and t, find remaining mass then λ
    const t_elapsed=r(1,4)*iso.t,m0=r(100,500,1),n_hl=t_elapsed/iso.t,rem=m0*Math.pow(0.5,n_hl),lambda=Math.log(2)/iso.t;
    return{question:`A ${m0} g sample of ${iso.n} (t½=${iso.t} ${iso.u}) has been decaying for ${t_elapsed} ${iso.u}. (1) How much remains? (2) What is λ? Enter the remaining mass as your answer.`,given:`m₀=${m0} g, t=${t_elapsed} ${iso.u}, t½=${iso.t} ${iso.u}`,answer:rem,unit:'g',steps:[`Step 1: n=${t_elapsed}/${iso.t}=${n_hl} half-lives`,`Step 2: remaining=${m0}×(0.5)^${n_hl}=${rem.toFixed(3)} g`,`Step 3: λ=ln(2)/t½=${lambda.toExponential(4)} ${iso.u}⁻¹`],hint:`n=t/t½ first, then remaining=m₀×(½)^n. Advanced: also know λ=ln2/t½.`};
}

// ══════════════════════════════════════════════════════════════════════════════
// CHECK / FEEDBACK
// ══════════════════════════════════════════════════════════════════════════════
function checkAnswer(){
    const ua=parseFloat(document.getElementById('answerInput').value);
    if(isNaN(ua)){alert('Please enter a number');return;}
    stats.a++;
    const tol=Math.max(Math.abs(prob.answer)*0.02,0.001);
    const ok=Math.abs(ua-prob.answer)<=tol;
    if(ok)stats.c++;
    updateStats();
    const fb=document.getElementById('feedback');
    const ans=Math.abs(prob.answer)<1e-4&&prob.answer!==0?prob.answer.toExponential(4):parseFloat(prob.answer.toFixed(4));
    fb.className='feedback '+(ok?'correct':'incorrect');
    fb.innerHTML=`<div class="fb-title">${ok?'✓ Correct!':'✗ Not quite'}</div>${!ok?`<p>Your answer: ${ua} ${prob.unit}</p>`:''}<p>Correct answer: ${ans} ${chemFmt(prob.unit)}</p><div class="solution"><h4>Solution Steps:</h4>${prob.steps.map(s=>`<div class="step">${chemFmt(s)}</div>`).join('')}</div>`;
}

function showHint(){
    if(hinted)return;
    hinted=true;
    document.getElementById('feedback').innerHTML=`<div class="hint-box"><div class="given-data">${chemFmt(prob.given.replace(/\n/g,'<br>'))}</div><br>💡 ${chemFmt(prob.hint)}</div>`;
}

function updateStats(){
    document.getElementById('sAttempted').textContent=stats.a;
    document.getElementById('sCorrect').textContent=stats.c;
    document.getElementById('sAccuracy').textContent=stats.a>0?(stats.c/stats.a*100).toFixed(0)+'%':'—';
}

document.getElementById('answerInput').addEventListener('keypress',e=>{if(e.key==='Enter')checkAnswer();});
</script>
